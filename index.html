function ContractsPage({ setRoute }){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  let items = state.contracts;
  if(statusFilter) items = items.filter(c=>c.status===statusFilter);
  const filtered = useFiltered(items, search, ['tawtheeqNo','notes']);

  function blank(){ return { id:uid('c'), unitId:'', tenantId:'', startDate:todayISO(), endDate:'', annualRentAed:0, numCheques:4, securityDepositAed:0, tawtheeqNo:'', tawtheeqExpiry:'', commission:0, vatPct:0, isCommercial:false, status:'active', renewedFromId:null, notes:'', createdAt:new Date().toISOString() }; }

  function save(item, opts={}){
    const existing = state.contracts.find(c=>c.id===item.id);
    if(existing){
      dispatch({ type:'updateContract', item });
    } else {
      dispatch({ type:'addContract', item });
      const u = state.units.find(x=>x.id===item.unitId);
      if(u && u.status!=='occupied') dispatch({ type:'updateUnit', item:{ ...u, status:'occupied' } });
      if(opts.generateCheques){
        const items = buildChequeSchedule(item);
        dispatch({ type:'addCheques', items });
      }
      // Mark prior contract as renewed if this is a renewal
      if(item.renewedFromId){
        const old = state.contracts.find(c=>c.id===item.renewedFromId);
        if(old) dispatch({ type:'updateContract', item:{...old, status:'renewed'} });
      }
    }
    setEditItem(null);
  }

  function renew(c){
    const oldEnd = parseISO(c.endDate);
    const newStart = oldEnd ? addMonths(oldEnd, 0) : new Date();
    if(oldEnd) newStart.setDate(newStart.getDate()+1);
    const newEnd = addMonths(newStart, 12);
    const cappedRent = Math.round((parseFloat(c.annualRentAed)||0)*1.05);
    setEditItem({
      id: uid('c'),
      unitId: c.unitId,
      tenantId: c.tenantId,
      startDate: toISODate(newStart),
      endDate: toISODate(newEnd),
      annualRentAed: c.annualRentAed,  // user can adjust up to cappedRent
      numCheques: c.numCheques || 4,
      securityDepositAed: c.securityDepositAed || 0,
      tawtheeqNo: '',
      tawtheeqExpiry: '',
      commission: 0,
      isCommercial: !!c.isCommercial,
      vatPct: c.vatPct || 0,
      status: 'active',
      renewedFromId: c.id,
      notes: 'Renewed from previous contract.',
      createdAt: new Date().toISOString(),
    });
  }

  const today = startOfDay(new Date());
  if(state.units.length===0 || state.tenants.length===0){
    return <Card><Empty icon="📄" title={t('empty')} hint={`${t('units')} + ${t('tenants')}`} /></Card>;
  }

  return (
    <>
      <PageHeader title={t('contracts')} count={filtered.length} search={search} setSearch={setSearch}
        filter={
          <Select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="text-sm">
            <option value="">{t('all')}</option>
            {CONTRACT_STATUS.map(s=> <option key={s} value={s}>{t('contract_'+s)}</option>)}
          </Select>
        }
        action={<Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addContract')}</Button>} />

      {filtered.length===0 ? (
        <Card><Empty icon="📄" title={t('empty')} hint={t('emptyHelp')} /></Card>
      ) : (
        <div className="space-y-3">
          {filtered.map(c=>{
            const u = state.units.find(x=>x.id===c.unitId);
            const p = u && state.properties.find(x=>x.id===u.propertyId);
            const tn = state.tenants.find(x=>x.id===c.tenantId);
            const end = parseISO(c.endDate);
            const daysToEnd = end ? daysBetween(today, end) : null;
            const cheques = state.cheques.filter(ch=>ch.contractId===c.id);
            const clearedCount = cheques.filter(ch=>ch.status==='cleared').length;
            const progressPct = cheques.length ? Math.round((clearedCount/cheques.length)*100) : 0;
            const nextCheque = cheques.filter(ch=>{
              const d = parseISO(ch.dueDate); return d && d>=today && ch.status==='pending';
            }).sort((a,b)=>a.dueDate.localeCompare(b.dueDate))[0];
            const contractDoc = state.documents.find(d=>d.ownerType==='contract' && d.ownerId===c.id);
            const showNotice = daysToEnd!=null && daysToEnd<=60 && daysToEnd>=0 && c.status==='active';
            const expiredOrAlmost = c.status==='expired' || (daysToEnd!=null && daysToEnd<=30 && c.status==='active');

            return (
              <Card key={c.id} onClick={()=>setRoute('contracts/'+c.id)}>
                <div className="flex flex-col lg:flex-row lg:items-center gap-4 lg:gap-6">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <h3 className="font-semibold text-ink-900 truncate">{pickName(tn,lang)||'—'}</h3>
                      <Badge tone={c.status==='active'?'green':c.status==='expired'?'red':'gray'}>{t('contract_'+c.status)}</Badge>
                      {c.isCommercial && <Badge tone="blue">VAT 5%</Badge>}
                      {c.renewedFromId && <Badge tone="gold">↻ Renewed</Badge>}
                    </div>
                    <div className="text-sm text-ink-500 mt-1">{pickName(p,lang)} · {u?.label} · {p?.emirate}</div>
                    <div className="text-xs text-ink-500 mt-1">{fmtDate(c.startDate,lang)} → {fmtDate(c.endDate,lang)}</div>
                    {c.tawtheeqNo && <div className="text-xs text-ink-500 mt-0.5">{t('tawtheeqNo')}: <span className="num">{c.tawtheeqNo}</span></div>}
                    {/* Progress bar */}
                    {cheques.length>0 && (
                      <div className="mt-3">
                        <div className="flex items-center justify-between text-xs text-ink-500 mb-1">
                          <span>{clearedCount}/{cheques.length} cheques cleared</span>
                          <span className="font-medium">{progressPct}%</span>
                        </div>
                        <div className="h-2 bg-ink-100 rounded-full overflow-hidden">
                          <div className="h-full bg-emerald-500" style={{ width: progressPct+'%' }}/>
                        </div>
                      </div>
                    )}
                    {/* Next cheque */}
                    {nextCheque && (
                      <div className="mt-2 text-xs text-ink-700">
                        Next: <span className="font-medium">{fmtAed(nextCheque.amountAed,lang)}</span> on <span className="num">{fmtDate(nextCheque.dueDate,lang)}</span>
                        {' '}<Badge tone={daysBetween(today, parseISO(nextCheque.dueDate))<=7?'amber':'gray'}>{daysBetween(today, parseISO(nextCheque.dueDate))} {t('daysLeft')}</Badge>
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-3 lg:grid-cols-3 gap-4 lg:gap-6 text-end">
                    <div>
                      <div className="text-xs text-ink-500">{t('annualRent')}</div>
                      <div className="font-semibold text-ink-900 num">{fmtAed(c.annualRentAed,lang)}</div>
                    </div>
                    <div>
                      <div className="text-xs text-ink-500">{t('numCheques')}</div>
                      <div className="font-semibold text-ink-900 num">{cheques.length} ({clearedCount}✓)</div>
                    </div>
                    <div>
                      <div className="text-xs text-ink-500">{daysToEnd!=null && daysToEnd<0 ? t('overdueBy') : t('daysLeft')}</div>
                      <div className={classNames('font-semibold num', daysToEnd!=null && daysToEnd<=60 ? 'text-amber-700':'text-ink-900', daysToEnd!=null && daysToEnd<0 && 'text-red-600')}>
                        {daysToEnd!=null ? Math.abs(daysToEnd) : '—'}
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-1 flex-wrap" onClick={e=>e.stopPropagation()}>
                    {contractDoc && (
                      <a href={contractDoc.dataUrl} download={contractDoc.name} target="_blank" rel="noopener noreferrer"
                        className="px-2 py-1.5 rounded-lg bg-ink-100 hover:bg-ink-200 text-ink-900 text-xs font-medium">📄 PDF</a>
                    )}
                    {expiredOrAlmost && (
                      <Button size="sm" variant="gold" onClick={()=>renew(c)}>↻ Renew</Button>
                    )}
                    <RowActions onEdit={()=>setEditItem(c)} onDelete={()=>setDeleteId(c.id)} />
                  </div>
                </div>
                {showNotice && (
                  <div className="mt-3 p-3 rounded-xl bg-amber-50 border border-amber-200 text-sm text-amber-800 flex items-start gap-2" onClick={e=>e.stopPropagation()}>
                    <span className="mt-0.5"><I.alert/></span>
                    <div>
                      <strong>2-month notice window.</strong> UAE law requires 2 months' written notice before lease end for non-renewal or rent change. Missing this auto-renews at current rent.
                    </div>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      <ContractEditor open={!!editItem} item={editItem} onClose={()=>setEditItem(null)} onSave={save} />
      <ConfirmDialog open={!!deleteId} message={t('confirmDelete')+' '+t('contract')}
        onCancel={()=>setDeleteId(null)} onConfirm={()=>{ dispatch({ type:'deleteContract', id:deleteId }); setDeleteId(null); }} />
    </>
  );
}

// ---------- ContractDetail page ------------------------------------------

function ContractDetail({ id, setRoute }){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const today = startOfDay(new Date());
  const c = state.contracts.find(x=>x.id===id);
  const [editing, setEditing] = useState(false);
  const [deleting, setDeleting] = useState(false);

  if(!c){
    return (
      <div className="text-center py-20">
        <h2 className="text-xl font-semibold text-ink-900">Contract not found.</h2>
        <Button className="mt-4" variant="secondary" onClick={()=>setRoute('contracts')}>← {t('contracts')}</Button>
      </div>
    );
  }
  const u  = state.units.find(x=>x.id===c.unitId);
  const p  = u && state.properties.find(x=>x.id===u.propertyId);
  const tn = state.tenants.find(x=>x.id===c.tenantId);
  const cheques = state.cheques.filter(ch=>ch.contractId===c.id).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  const payments = state.payments.filter(pm=>pm.contractId===c.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const docs = state.documents.filter(d=>d.ownerType==='contract' && d.ownerId===c.id);
  const clearedCount = cheques.filter(ch=>ch.status==='cleared').length;
  const progressPct = cheques.length ? Math.round((clearedCount/cheques.length)*100) : 0;
  const totalCleared = cheques.filter(ch=>ch.status==='cleared').reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const outstanding = cheques.filter(ch=>ch.status==='pending'||ch.status==='bounced').reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const end = parseISO(c.endDate);
  const daysToEnd = end ? daysBetween(today, end) : null;
  const showNotice = daysToEnd!=null && daysToEnd<=60 && daysToEnd>=0 && c.status==='active';

  function setChequeStatus(ch, status){
    const patch = { ...ch, status };
    if(status==='deposited' && !patch.depositedDate) patch.depositedDate = todayISO();
    if(status==='cleared'   && !patch.clearedDate)   patch.clearedDate   = todayISO();
    dispatch({ type:'updateCheque', item: patch });
  }

  function renew(){
    const oldEnd = parseISO(c.endDate);
    const newStart = oldEnd ? new Date(oldEnd) : new Date();
    if(oldEnd) newStart.setDate(newStart.getDate()+1);
    const newEnd = addMonths(newStart, 12);
    const newId = uid('c');
    const cappedRent = Math.round((parseFloat(c.annualRentAed)||0)*1.05);
    const newC = {
      id: newId,
      unitId: c.unitId, tenantId: c.tenantId,
      startDate: toISODate(newStart), endDate: toISODate(newEnd),
      annualRentAed: c.annualRentAed,
      numCheques: c.numCheques || 4,
      securityDepositAed: c.securityDepositAed || 0,
      tawtheeqNo:'', tawtheeqExpiry:'',
      commission:0, isCommercial:!!c.isCommercial, vatPct:c.vatPct||0,
      status:'active', renewedFromId:c.id,
      notes:`Renewed from ${c.id}. Old rent: ${c.annualRentAed} AED. 5% cap: ${cappedRent} AED.`,
      createdAt:new Date().toISOString(),
    };
    dispatch({ type:'addContract', item: newC });
    dispatch({ type:'updateContract', item:{...c, status:'renewed'} });
    const sched = buildChequeSchedule(newC);
    dispatch({ type:'addCheques', items: sched });
    setRoute('contracts/'+newId);
  }

  return (
    <div className="space-y-6">
      <div>
        <button onClick={()=>setRoute('contracts')} className="inline-flex items-center gap-1 text-sm text-ink-500 hover:text-ink-900">← {t('contracts')}</button>
      </div>

      <Card>
        <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
          <div className="min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <h1 className="text-2xl font-bold text-ink-900 truncate">{pickName(tn,lang)}</h1>
              <Badge tone={c.status==='active'?'green':c.status==='expired'?'red':'gray'}>{t('contract_'+c.status)}</Badge>
              {c.isCommercial && <Badge tone="blue">VAT 5%</Badge>}
              {c.renewedFromId && <Badge tone="gold">↻ Renewed</Badge>}
            </div>
            <div className="text-sm text-ink-500 mt-1">
              <button className="hover:text-ink-900 hover:underline" onClick={()=>setRoute('properties/'+(p?.id||''))}>{pickName(p,lang)}</button>
              {' · '}{u?.label}{' · '}{p?.emirate}
            </div>
            <div className="text-sm text-ink-700 mt-2">{fmtDate(c.startDate,lang)} → {fmtDate(c.endDate,lang)}</div>
            {c.tawtheeqNo && <div className="text-xs text-ink-500 mt-1">{t('tawtheeqNo')}: <span className="num">{c.tawtheeqNo}</span>{c.tawtheeqExpiry && <span> · expires {fmtDate(c.tawtheeqExpiry,lang)}</span>}</div>}
          </div>
          <div className="flex flex-wrap gap-2">
            {(c.status==='active'||c.status==='expired') && <Button size="sm" variant="gold" onClick={renew}>↻ Renew</Button>}
            {docs[0] && <a href={docs[0].dataUrl} download={docs[0].name}><Button size="sm" variant="secondary">📄 PDF</Button></a>}
            <Button variant="secondary" size="sm" icon={<I.edit/>} onClick={()=>setEditing(true)}>{t('edit')}</Button>
            <Button variant="danger" size="sm" icon={<I.trash/>} onClick={()=>setDeleting(true)}>{t('delete')}</Button>
          </div>
        </div>
      </Card>

      {showNotice && (
        <div className="p-4 rounded-2xl bg-amber-50 border border-amber-200 text-sm text-amber-800 flex items-start gap-3">
          <span className="mt-0.5"><I.alert/></span>
          <div>
            <strong>2-month notice window — {daysToEnd} days until lease ends.</strong> Send the tenant written notice now if you want to non-renew or change rent. Missing this auto-renews at the same terms.
          </div>
        </div>
      )}

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <Kpi tone="blue"  label={t('annualRent')}   value={fmtAed(c.annualRentAed,lang)} sub={c.isCommercial?'+ 5% VAT':'VAT exempt'}/>
        <Kpi tone="green" label="Collected"         value={fmtAed(totalCleared,lang)} sub={`${progressPct}% of ${fmtAed(c.annualRentAed,lang)}`}/>
        <Kpi tone="amber" label="Outstanding"       value={fmtAed(outstanding,lang)} sub={`${cheques.length-clearedCount} ${t('cheque').toLowerCase()}s`}/>
        <Kpi tone="red"   label={t('endDate')}      value={daysToEnd!=null?Math.abs(daysToEnd):'—'} sub={daysToEnd!=null && daysToEnd<0 ? t('daysOverdue') : t('daysLeft')}/>
      </div>

      {/* Progress bar */}
      {cheques.length>0 && (
        <Card>
          <div className="flex items-center justify-between text-sm mb-2">
            <span className="text-ink-700">Lease payment progress</span>
            <span className="font-semibold text-ink-900">{clearedCount}/{cheques.length} cheques · {progressPct}%</span>
          </div>
          <div className="h-3 bg-ink-100 rounded-full overflow-hidden">
            <div className="h-full bg-emerald-500" style={{ width: progressPct+'%' }}/>
          </div>
        </Card>
      )}

      {/* Cheques */}
      <Card title={`${t('cheques')} (${cheques.length})`}
        action={<Button size="sm" variant="secondary" onClick={()=>setRoute('cheques')}>{t('add')} {t('cheque').toLowerCase()}</Button>}>
        {cheques.length===0 ? <div className="text-ink-500 text-sm">{t('empty')}</div> : (
          <div className="overflow-x-auto -mx-5">
            <table className="w-full text-sm">
              <thead className="text-ink-500">
                <tr className="border-b border-ink-100">
                  <th className="text-start px-5 py-2 font-medium">{t('dueDate')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('chequeNo')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('bank')}</th>
                  <th className="text-end px-3 py-2 font-medium">{t('amount')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('status')}</th>
                  <th className="text-end px-5 py-2 font-medium">{t('actions')}</th>
                </tr>
              </thead>
              <tbody>
                {cheques.map(ch=>{
                  const due = parseISO(ch.dueDate);
                  const days = due ? daysBetween(today, due) : null;
                  return (
                    <tr key={ch.id} className="border-b border-ink-100 last:border-0">
                      <td className="px-5 py-2 num">{fmtDate(ch.dueDate, lang)}
                        {days!=null && (ch.status==='pending'||ch.status==='bounced') && (
                          <div><Badge tone={days<0?'red':days<=7?'amber':'gray'}>{days<0?`${-days} ${t('daysOverdue')}`:days===0?t('today'):`${days}d`}</Badge></div>
                        )}
                      </td>
                      <td className="px-3 py-2 num">{ch.chequeNo||'—'}</td>
                      <td className="px-3 py-2">{ch.bank||'—'}</td>
                      <td className="px-3 py-2 text-end num font-semibold">{fmtAed(ch.amountAed,lang)}</td>
                      <td className="px-3 py-2"><Badge tone={ch.status==='cleared'?'green':ch.status==='deposited'?'blue':ch.status==='bounced'?'red':ch.status==='pending'?'amber':'gray'}>{t('cheque_'+ch.status)}</Badge></td>
                      <td className="px-5 py-2 text-end">
                        <div className="flex justify-end gap-1">
                          {ch.status==='pending'   && <button onClick={()=>setChequeStatus(ch,'deposited')} className="px-2 py-1 rounded bg-emerald-50 text-emerald-700 text-xs">↑</button>}
                          {ch.status==='deposited' && <button onClick={()=>setChequeStatus(ch,'cleared')}   className="px-2 py-1 rounded bg-emerald-600 text-white text-xs">✓</button>}
                          {(ch.status==='pending'||ch.status==='deposited') && <button onClick={()=>setChequeStatus(ch,'bounced')} className="px-2 py-1 rounded bg-red-50 text-red-700 text-xs">✗</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {/* Payments + Documents */}
      <div className="grid lg:grid-cols-2 gap-6">
        <Card title={`${t('payments')} (${payments.length})`}>
          {payments.length===0 ? <div className="text-ink-500 text-sm">{t('empty')}</div> : (
            <ul className="divide-y divide-ink-100">
              {payments.map(pm=>(
                <li key={pm.id} className="py-2 flex items-center justify-between gap-3">
                  <div>
                    <div className="font-medium text-ink-900 num">{fmtDate(pm.date,lang)}</div>
                    <div className="text-xs text-ink-500">{t('pay_'+pm.method)}{pm.reference?` · ${pm.reference}`:''}</div>
                  </div>
                  <div className="font-semibold text-ink-900 num">{fmtAed(pm.amountAed,lang)}</div>
                </li>
              ))}
            </ul>
          )}
        </Card>

        <Card title={`${t('documents')} (${docs.length})`}>
          {docs.length===0 ? <div className="text-ink-500 text-sm">{t('empty')}</div> : (
            <ul className="divide-y divide-ink-100">
              {docs.map(d=>(
                <li key={d.id} className="py-2 flex items-center justify-between gap-3">
                  <div className="min-w-0">
                    <div className="font-medium text-ink-900 truncate">{d.name}</div>
                    <div className="text-xs text-ink-500">{t('doc_'+d.kind)} · {fmtBytes(d.sizeBytes)}</div>
                  </div>
                  <a href={d.dataUrl} download={d.name} className="text-sm font-medium text-ink-900 hover:underline">{t('download')}</a>
                </li>
              ))}
            </ul>
          )}
        </Card>
      </div>

      {c.notes && <Card title={t('notes')}><p className="text-ink-700 whitespace-pre-wrap">{c.notes}</p></Card>}

      <ContractEditor open={editing} item={c} onClose={()=>setEditing(false)} onSave={(item)=>{ dispatch({type:'updateContract', item}); setEditing(false); }}/>
      <ConfirmDialog open={deleting} message={t('confirmDelete')+' '+t('contract')}
        onCancel={()=>setDeleting(false)}
        onConfirm={()=>{ dispatch({ type:'deleteContract', id:c.id }); setRoute('contracts'); }}/>
    </div>
  );
}

function ContractEditor({ open, item, onClose, onSave }){
  const { state } = useApp();
  const { t, lang } = useT();
  const [v, setV] = useState(item || {});
  const [genCheques, setGenCheques] = useState(true);
  useEffect(()=>{ setV(item || {}); setGenCheques(true); }, [item]);
  if(!open) return null;
  const isNew = !state.contracts.some(c=>c.id===v.id);
  const update = p => setV({...v, ...p});

  // auto-fill annual rent from unit
  const u = state.units.find(x=>x.id===v.unitId);
  function pickUnit(unitId){
    const u = state.units.find(x=>x.id===unitId);
    update({ unitId, annualRentAed: u ? (parseFloat(u.monthlyRentAed||0)*12) : (v.annualRentAed||0) });
  }
  // auto-fill end date 12 months after start
  function pickStart(s){
    const start = parseISO(s);
    const end = start ? toISODate(addMonths(start, 12)) : '';
    update({ startDate:s, endDate: v.endDate || end });
  }

  // 5% cap calculator if renewing
  const lastContract = state.contracts.find(c=>c.unitId===v.unitId && c.id!==v.id && (c.status==='expired'||c.status==='renewed'));
  const capMax = lastContract ? Math.round(lastContract.annualRentAed*1.05) : null;
  const overCap = capMax!=null && (parseFloat(v.annualRentAed)||0) > capMax;

  const perCheque = (parseFloat(v.annualRentAed)||0) / Math.max(1, parseInt(v.numCheques||1,10));

  return (
    <Modal open={open} onClose={onClose} title={isNew ? t('addContract') : t('editContract')} size="lg">
      <div className="grid sm:grid-cols-2 gap-4">
        <Field label={t('unit')} required>
          <Select value={v.unitId||''} onChange={e=>pickUnit(e.target.value)}>
            <option value="">{t('select')}</option>
            {state.units.map(u=>{
              const p = state.properties.find(p=>p.id===u.propertyId);
              return <option key={u.id} value={u.id}>{pickName(p,lang)} — {u.label} ({fmtAed(u.monthlyRentAed,lang)}/mo)</option>;
            })}
          </Select>
        </Field>
        <Field label={t('tenant')} required>
          <Select value={v.tenantId||''} onChange={e=>update({tenantId:e.target.value})}>
            <option value="">{t('select')}</option>
            {state.tenants.map(tn=> <option key={tn.id} value={tn.id}>{pickName(tn,lang)} ({tn.phone})</option>)}
          </Select>
        </Field>
        <Field label={t('startDate')} required>
          <Input type="date" value={v.startDate||''} onChange={e=>pickStart(e.target.value)}/>
        </Field>
        <Field label={t('endDate')} required>
          <Input type="date" value={v.endDate||''} onChange={e=>update({endDate:e.target.value})}/>
        </Field>
        <Field label={`${t('annualRent')} (${t('aed')})`} required hint={capMax ? `5% cap: max ${fmtAed(capMax,lang)} at renewal` : null}>
          <Input type="number" min="0" value={v.annualRentAed||0} onChange={e=>update({annualRentAed:parseFloat(e.target.value||0)})}/>
          {overCap && <div className="mt-1 text-xs text-red-600">⚠ Exceeds 5% annual cap. Previous: {fmtAed(lastContract.annualRentAed,lang)}.</div>}
        </Field>
        <Field label={t('numCheques')} hint={perCheque ? `${fmtAed(perCheque,lang)} ${t('perCheque').toLowerCase()}`:null}>
          <Select value={v.numCheques||4} onChange={e=>update({numCheques:parseInt(e.target.value,10)})}>
            {[1,2,3,4,6,12].map(n=> <option key={n} value={n}>{n}</option>)}
          </Select>
        </Field>
        <Field label={`${t('securityDeposit')} (${t('aed')})`}>
          <Input type="number" min="0" value={v.securityDepositAed||0} onChange={e=>update({securityDepositAed:parseFloat(e.target.value||0)})}/>
        </Field>
        <Field label={t('tawtheeqNo')}>
          <Input value={v.tawtheeqNo||''} onChange={e=>update({tawtheeqNo:e.target.value})}/>
        </Field>
        <Field label={`Tawtheeq ${t('endDate').toLowerCase()}`}>
          <Input type="date" value={v.tawtheeqExpiry||''} onChange={e=>update({tawtheeqExpiry:e.target.value})}/>
        </Field>
        <Field label={t('status')}>
          <Select value={v.status||'active'} onChange={e=>update({status:e.target.value})}>
            {CONTRACT_STATUS.map(s=> <option key={s} value={s}>{t('contract_'+s)}</option>)}
          </Select>
        </Field>
        <Field className="sm:col-span-2">
          <label className="inline-flex items-center gap-2 text-sm">
            <input type="checkbox" checked={!!v.isCommercial} onChange={e=>update({isCommercial:e.target.checked, vatPct: e.target.checked?5:0})}/>
            <span>Commercial unit (apply 5% VAT)</span>
          </label>
        </Field>
        <Field label={t('notes')} className="sm:col-span-2">
          <Textarea rows="2" value={v.notes||''} onChange={e=>update({notes:e.target.value})}/>
        </Field>

        {isNew && (
          <Field className="sm:col-span-2">
            <label className="inline-flex items-center gap-2 text-sm">
              <input type="checkbox" checked={genCheques} onChange={e=>setGenCheques(e.target.checked)}/>
              <span>{t('generateCheques')} — {parseInt(v.numCheques||1,10)} {t('chequesWillBeCreated')}</span>
            </label>
          </Field>
        )}
      </div>
      <div className="mt-5 flex gap-2 justify-end">
        <Button variant="secondary" onClick={onClose}>{t('cancel')}</Button>
        <Button onClick={()=>{ if(!v.unitId||!v.tenantId||!v.startDate||!v.endDate||!v.annualRentAed){ alert(t('required')); return; } onSave(v, { generateCheques: isNew && genCheques }); }}>{t('save')}</Button>
      </div>
    </Modal>
  );
}

// ---------- ChequesPage --------------------------------------------------

function ChequesPage(){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [receiptFor, setReceiptFor] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [contractFilter, setContractFilter] = useState('');

  let items = state.cheques;
  if(statusFilter)   items = items.filter(c=>c.status===statusFilter);
  if(contractFilter) items = items.filter(c=>c.contractId===contractFilter);
  items = [...items].sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  const filtered = useFiltered(items, search, ['chequeNo','bank','notes']);

  function blank(){ return { id:uid('ch'), contractId: state.contracts[0]?.id || '', chequeNo:'', bank:'', dueDate:todayISO(), amountAed:0, status:'pending', depositedDate:null, clearedDate:null, replacedByChequeId:null, notes:'' }; }
  function save(item){
    if(state.cheques.some(c=>c.id===item.id)) dispatch({ type:'updateCheque', item });
    else dispatch({ type:'addCheque', item });
    setEditItem(null);
  }
  function setStatus(c, status){
    const patch = { ...c, status };
    if(status==='deposited' && !patch.depositedDate) patch.depositedDate = todayISO();
    if(status==='cleared'   && !patch.clearedDate)   patch.clearedDate   = todayISO();
    dispatch({ type:'updateCheque', item: patch });
  }

  const today = startOfDay(new Date());

  // Summary: total pending
  const pendingTotal = state.cheques
    .filter(ch => ch.status==='pending' || ch.status==='bounced')
    .reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const pendingCount = state.cheques.filter(ch => ch.status==='pending' || ch.status==='bounced').length;
  const overdueCount = state.cheques.filter(ch => {
    const d = parseISO(ch.dueDate);
    return d && d<today && (ch.status==='pending'||ch.status==='bounced');
  }).length;

  // Group filtered cheques by year-month
  const grouped = useMemo(()=>{
    const m = new Map();
    filtered.forEach(ch=>{
      const d = parseISO(ch.dueDate);
      const key = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'unknown';
      if(!m.has(key)) m.set(key, []);
      m.get(key).push(ch);
    });
    return Array.from(m.entries()).map(([key,list])=>{
      const [y,mm] = key.split('-');
      const label = key==='unknown' ? '—' : new Date(parseInt(y,10), parseInt(mm,10)-1, 1).toLocaleDateString(lang==='ar'?'ar-AE':'en-GB',{ month:'long', year:'numeric' });
      const total = list.reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
      return { key, label, list, total };
    });
  }, [filtered, lang]);

  function renderRow(ch){
    const c = state.contracts.find(x=>x.id===ch.contractId);
    const tn = c && state.tenants.find(x=>x.id===c.tenantId);
    const u  = c && state.units.find(x=>x.id===c.unitId);
    const due = parseISO(ch.dueDate);
    const days = due ? daysBetween(today, due) : null;
    const overdue = days!=null && days<0 && (ch.status==='pending'||ch.status==='bounced');
    return (
      <tr key={ch.id} className={classNames('border-b border-ink-100 last:border-0 hover:bg-ink-100/40', overdue && 'bg-red-50/30')}>
        <td className="px-5 py-3">
          <div className="font-medium text-ink-900 num">{fmtDate(ch.dueDate, lang)}</div>
          {days!=null && (ch.status==='pending'||ch.status==='bounced') && (
            <div className="text-xs"><Badge tone={overdue?'red':days<=7?'amber':'gray'}>
              {overdue ? `${-days} ${t('daysOverdue')}` : days===0 ? t('today') : `${days} ${t('daysLeft')}`}
            </Badge></div>
          )}
        </td>
        <td className="px-3 py-3">{pickName(tn,lang) || '—'}</td>
        <td className="px-3 py-3 text-ink-700">{u?.label || '—'}</td>
        <td className="px-3 py-3 num">{ch.chequeNo || '—'}</td>
        <td className="px-3 py-3">{ch.bank || '—'}</td>
        <td className="px-3 py-3 text-end font-semibold num">{fmtAed(ch.amountAed, lang)}</td>
        <td className="px-3 py-3">
          <Badge tone={ch.status==='cleared'?'green':ch.status==='deposited'?'blue':ch.status==='bounced'?'red':ch.status==='replaced'||ch.status==='cancelled'?'gray':'amber'}>
            {t('cheque_'+ch.status)}
          </Badge>
        </td>
        <td className="px-5 py-3 text-end">
          <div className="flex items-center gap-1 justify-end flex-wrap">
            {ch.status==='pending' && <button onClick={()=>setStatus(ch,'deposited')} title={t('markDeposited')} className="px-2 py-1 rounded bg-emerald-50 text-emerald-700 text-xs font-medium">↑</button>}
            {ch.status==='deposited' && (<>
              <button onClick={()=>setStatus(ch,'cleared')} title={t('markCleared')} className="px-2 py-1 rounded bg-emerald-600 text-white text-xs font-medium">✓</button>
              <button onClick={()=>setStatus(ch,'bounced')} title={t('markBounced')} className="px-2 py-1 rounded bg-red-50 text-red-700 text-xs font-medium">✗</button>
            </>)}
            {ch.status==='cleared' && <button onClick={()=>setReceiptFor(ch)} title={t('print')+' '+t('receipt')} className="px-2 py-1 rounded bg-ink-100 text-ink-900 text-xs font-medium">🖨️</button>}
            <RowActions onEdit={()=>setEditItem(ch)} onDelete={()=>setDeleteId(ch.id)} />
          </div>
        </td>
      </tr>
    );
  }

  return (
    <>
      <PageHeader title={t('cheques')} count={filtered.length} search={search} setSearch={setSearch}
        filter={
          <div className="flex gap-2">
            <Select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="text-sm">
              <option value="">{t('all')}</option>
              {CHEQUE_STATUS.map(s=> <option key={s} value={s}>{t('cheque_'+s)}</option>)}
            </Select>
            <Select value={contractFilter} onChange={e=>setContractFilter(e.target.value)} className="text-sm">
              <option value="">{t('all')} {t('contracts').toLowerCase()}</option>
              {state.contracts.map(c=>{
                const tn = state.tenants.find(x=>x.id===c.tenantId);
                const u  = state.units.find(x=>x.id===c.unitId);
                return <option key={c.id} value={c.id}>{pickName(tn,lang)} · {u?.label}</option>;
              })}
            </Select>
          </div>
        }
        action={state.contracts.length>0 ? <Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addCheque')}</Button> : null} />

      {/* Summary KPIs */}
      {state.cheques.length>0 && (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
          <Kpi tone="amber" label="Total pending" value={fmtAed(pendingTotal, lang)} sub={`${pendingCount} ${t('cheque').toLowerCase()}s`} />
          <Kpi tone="red"   label={t('kpi_overdue')} value={overdueCount} sub={overdueCount?'needs action':'all on track'} />
          <Kpi tone="green" label="Cleared this year" value={fmtAed(
            state.cheques.filter(ch=>{ const d=parseISO(ch.clearedDate||ch.dueDate); return d && d.getFullYear()===today.getFullYear() && ch.status==='cleared'; })
                       .reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0),
            lang
          )} />
        </div>
      )}

      {state.contracts.length===0 ? (
        <Card><Empty icon="🧾" title={t('empty')} hint={t('contracts')} /></Card>
      ) : filtered.length===0 ? (
        <Card><Empty icon="🧾" title={t('empty')} hint={t('emptyHelp')} /></Card>
      ) : (
        <div className="space-y-6">
          {grouped.map(g => (
            <section key={g.key}>
              <div className="flex items-baseline justify-between mb-2 px-1">
                <h2 className="text-base font-semibold text-ink-900">{g.label}</h2>
                <div className="text-sm text-ink-500">{g.list.length} {t('cheque').toLowerCase()}{g.list.length===1?'':'s'} · <span className="font-semibold text-ink-900 num">{fmtAed(g.total, lang)}</span></div>
              </div>
              <Card>
                <div className="overflow-x-auto -mx-5">
                  <table className="w-full text-sm">
                    <thead className="text-ink-500">
                      <tr className="border-b border-ink-100">
                        <th className="text-start px-5 py-2 font-medium">{t('dueDate')}</th>
                        <th className="text-start px-3 py-2 font-medium">{t('tenant')}</th>
                        <th className="text-start px-3 py-2 font-medium">{t('unit')}</th>
                        <th className="text-start px-3 py-2 font-medium">{t('chequeNo')}</th>
                        <th className="text-start px-3 py-2 font-medium">{t('bank')}</th>
                        <th className="text-end px-3 py-2 font-medium">{t('amount')}</th>
                        <th className="text-start px-3 py-2 font-medium">{t('status')}</th>
                        <th className="text-end px-5 py-2 font-medium">{t('actions')}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {g.list.map(renderRow)}
                    </tbody>
                  </table>
                </div>
              </Card>
            </section>
          ))}
        </div>
      )}

      <ChequeEditor open={!!editItem} item={editItem} onClose={()=>setEditItem(null)} onSave={save} />
      <ConfirmDialog open={!!deleteId} message={t('confirmDelete')}
        onCancel={()=>setDeleteId(null)} onConfirm={()=>{ dispatch({ type:'deleteCheque', id:deleteId }); setDeleteId(null); }} />
      <ReceiptModal open={!!receiptFor} cheque={receiptFor} onClose={()=>setReceiptFor(null)} />
    </>
  );
}

// ---------- ReceiptModal -------------------------------------------------

function ReceiptModal({ open, cheque, payment, onClose }){
  const { state } = useApp();
  const { t, lang } = useT();
  const rec = cheque || payment;
  if(!open || !rec) return null;
  const isPayment = !!payment;
  const c  = state.contracts.find(x=>x.id===rec.contractId);
  const tn = c && state.tenants.find(x=>x.id===c.tenantId);
  const u  = c && state.units.find(x=>x.id===c.unitId);
  const p  = u && state.properties.find(x=>x.id===u.propertyId);
  const landlordEn = state.settings.landlordName || '';
  const landlordAr = state.settings.landlordNameAr || landlordEn;
  const recDate = isPayment ? rec.date : (rec.clearedDate || rec.depositedDate || rec.dueDate);
  const methodEn = isPayment ? (rec.method==='cash'?'Cash':rec.method==='transfer'?'Bank transfer':rec.method==='card'?'Card':rec.method==='cheque'?'Cheque':'Other') : 'Cheque';
  const methodAr = isPayment ? (rec.method==='cash'?'نقداً':rec.method==='transfer'?'تحويل بنكي':rec.method==='card'?'بطاقة':rec.method==='cheque'?'شيك':'أخرى') : 'شيك';

  function printReceipt(){ window.print(); }

  return (
    <div className="fixed inset-0 z-50 bg-ink-900/40 backdrop-blur-sm flex items-center justify-center p-4 no-print" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden">
        <div className="px-5 py-4 border-b border-ink-100 flex items-center justify-between">
          <h3 className="font-semibold text-ink-900">{t('receipt')}</h3>
          <div className="flex gap-2">
            <Button size="sm" onClick={printReceipt} icon={<I.print/>}>{t('print')}</Button>
            <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-ink-100 text-ink-500">✕</button>
          </div>
        </div>
        <div id="rent-receipt" className="p-8 bg-white">
          {/* Bilingual header */}
          <div className="flex items-start justify-between gap-4 border-b-2 border-ink-900 pb-4">
            <div>
              <div className="text-xs uppercase text-ink-500 font-medium">Rent Receipt</div>
              <div className="text-3xl font-bold text-ink-900 mt-1">{landlordEn || 'Landlord'}</div>
            </div>
            <div className="text-end" dir="rtl">
              <div className="text-xs uppercase text-ink-500 font-medium">إيصال إيجار</div>
              <div className="text-3xl font-bold text-ink-900 mt-1">{landlordAr || 'المالك'}</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-6 mt-6 text-sm">
            <div>
              <div className="text-xs uppercase text-ink-500">Date / التاريخ</div>
              <div className="font-medium text-ink-900 num mt-1">{fmtDate(recDate, lang)}</div>
            </div>
            <div className="text-end">
              <div className="text-xs uppercase text-ink-500">Receipt # / رقم الإيصال</div>
              <div className="font-medium text-ink-900 num mt-1">{cheque.id.replace('ch_','').toUpperCase()}</div>
            </div>
          </div>

          <div className="mt-6 text-sm">
            <div className="text-xs uppercase text-ink-500">Received from / استلمت من</div>
            <div className="text-lg font-semibold text-ink-900 mt-1">{tn?.name || '—'}</div>
            {tn?.nameAr && <div className="text-ink-700" dir="rtl">{tn.nameAr}</div>}
            {tn?.emiratesId && <div className="text-xs text-ink-500 num mt-1">EID: {tn.emiratesId}</div>}
          </div>

          <div className="mt-6 grid grid-cols-2 gap-6 text-sm">
            <div>
              <div className="text-xs uppercase text-ink-500">For property / العقار</div>
              <div className="font-medium text-ink-900 mt-1">{p?.name || '—'}</div>
              <div className="text-ink-500 text-xs">{[p?.area, p?.emirate].filter(Boolean).join(', ')}</div>
            </div>
            <div className="text-end">
              <div className="text-xs uppercase text-ink-500">Unit / الوحدة</div>
              <div className="font-medium text-ink-900 mt-1">{u?.label || '—'}</div>
              <div className="text-ink-500 text-xs">{u?.kind}</div>
            </div>
          </div>

          {/* Big amount */}
          <div className="mt-8 bg-ink-100 rounded-2xl p-6 text-center">
            <div className="text-xs uppercase text-ink-500">Amount paid / المبلغ المدفوع</div>
            <div className="text-4xl font-bold text-ink-900 mt-2 num">{fmtAed(rec.amountAed, 'en')}</div>
            {isPayment && rec.purpose && rec.purpose!=='rent' && <div className="text-xs text-ink-500 uppercase mt-2">For: {rec.purpose}</div>}
          </div>

          <div className="mt-6 grid grid-cols-3 gap-4 text-sm">
            <div>
              <div className="text-xs uppercase text-ink-500">Method / طريقة الدفع</div>
              <div className="font-medium text-ink-900 mt-1">{methodEn} / {methodAr}</div>
            </div>
            <div>
              <div className="text-xs uppercase text-ink-500">{isPayment ? 'Reference / المرجع' : 'Cheque # / رقم الشيك'}</div>
              <div className="font-medium text-ink-900 num mt-1">{isPayment ? (rec.reference || '—') : (rec.chequeNo || '—')}</div>
            </div>
            <div>
              <div className="text-xs uppercase text-ink-500">{isPayment ? '—' : 'Bank / البنك'}</div>
              <div className="font-medium text-ink-900 mt-1">{isPayment ? '—' : (rec.bank || '—')}</div>
            </div>
          </div>

          {c && (
            <div className="mt-6 text-sm text-ink-500">
              <span className="text-xs uppercase">For period / عن فترة:</span>{' '}
              {fmtDate(c.startDate, 'en')} → {fmtDate(c.endDate, 'en')}
              {c.tawtheeqNo && <span> · Tawtheeq: <span className="num">{c.tawtheeqNo}</span></span>}
            </div>
          )}

          <div className="mt-12 grid grid-cols-2 gap-12 text-sm">
            <div>
              <div className="border-t-2 border-ink-900 pt-2 text-ink-500 text-xs">Landlord signature / توقيع المالك</div>
            </div>
            <div>
              <div className="border-t-2 border-ink-900 pt-2 text-ink-500 text-xs">Tenant signature / توقيع المستأجر</div>
            </div>
          </div>
        </div>
      </div>

      <style>{`
        @media print {
          body * { visibility: hidden; }
          #rent-receipt, #rent-receipt * { visibility: visible; }
          #rent-receipt { position: absolute; inset: 0; padding: 24px; }
        }
      `}</style>
    </div>
  );
}

function ChequeEditor({ open, item, onClose, onSave }){
  const { state } = useApp();
  const { t, lang } = useT();
  const [v, setV] = useState(item || {});
  useEffect(()=>{ setV(item || {}); }, [item]);
  if(!open) return null;
  const update = p => setV({...v, ...p});
  const isNew = !state.cheques.some(c=>c.id===v.id);

  return (
    <Modal open={open} onClose={onClose} title={isNew ? t('addCheque') : t('editCheque')}>
      <div className="grid sm:grid-cols-2 gap-4">
        <Field label={t('contract')} required className="sm:col-span-2">
          <Select value={v.contractId||''} onChange={e=>update({contractId:e.target.value})}>
            <option value="">{t('select')}</option>
            {state.contracts.map(c=>{
              const tn = state.tenants.find(x=>x.id===c.tenantId);
              const u  = state.units.find(x=>x.id===c.unitId);
              return <option key={c.id} value={c.id}>{pickName(tn,lang)} · {u?.label} · {fmtAed(c.annualRentAed,lang)}/yr</option>;
            })}
          </Select>
        </Field>
        <Field label={t('chequeNo')}>
          <Input value={v.chequeNo||''} onChange={e=>update({chequeNo:e.target.value})}/>
        </Field>
        <Field label={t('bank')}>
          <Input value={v.bank||''} onChange={e=>update({bank:e.target.value})}/>
        </Field>
        <Field label={t('dueDate')} required>
          <Input type="date" value={v.dueDate||''} onChange={e=>update({dueDate:e.target.value})}/>
        </Field>
        <Field label={`${t('amount')} (${t('aed')})`} required>
          <Input type="number" min="0" value={v.amountAed||0} onChange={e=>update({amountAed:parseFloat(e.target.value||0)})}/>
        </Field>
        <Field label={t('status')}>
          <Select value={v.status||'pending'} onChange={e=>update({status:e.target.value})}>
            {CHEQUE_STATUS.map(s=> <option key={s} value={s}>{t('cheque_'+s)}</option>)}
          </Select>
        </Field>
        <Field label={t('depositedDate')}>
          <Input type="date" value={v.depositedDate||''} onChange={e=>update({depositedDate:e.target.value})}/>
        </Field>
        <Field label={t('clearedDate')}>
          <Input type="date" value={v.clearedDate||''} onChange={e=>update({clearedDate:e.target.value})}/>
        </Field>
        <Field label={t('notes')} className="sm:col-span-2">
          <Textarea rows="2" value={v.notes||''} onChange={e=>update({notes:e.target.value})}/>
        </Field>
      </div>
      <div className="mt-5 flex gap-2 justify-end">
        <Button variant="secondary" onClick={onClose}>{t('cancel')}</Button>
        <Button onClick={()=>{ if(!v.contractId||!v.dueDate||!v.amountAed){ alert(t('required')); return; } onSave(v); }}>{t('save')}</Button>
      </div>
    </Modal>
  );
}

const PAYMENT_PURPOSES = ['rent','deposit','commission','refund','other'];

function PaymentsPage(){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const today = startOfDay(new Date());
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [receiptFor, setReceiptFor] = useState(null);
  const [search, setSearch] = useState('');
  const items = [...state.payments].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const filtered = useFiltered(items, search, ['reference','notes','method','purpose']);

  // KPIs
  const thisMonth = state.payments.filter(p=>{ const d=parseISO(p.date); return d && d.getFullYear()===today.getFullYear() && d.getMonth()===today.getMonth(); });
  const thisYear  = state.payments.filter(p=>{ const d=parseISO(p.date); return d && d.getFullYear()===today.getFullYear(); });
  const monthTotal = thisMonth.reduce((s,p)=>s+(parseFloat(p.amountAed)||0),0);
  const yearTotal  = thisYear.reduce((s,p)=>s+(parseFloat(p.amountAed)||0),0);
  const rentYearTotal = thisYear.filter(p=>p.purpose==='rent' || !p.purpose).reduce((s,p)=>s+(parseFloat(p.amountAed)||0),0);

  function blank(){ return { id:uid('pm'), contractId: state.contracts[0]?.id||'', date:todayISO(), amountAed:0, method:'transfer', purpose:'rent', reference:'', notes:'' }; }
  function save(it){ if(state.payments.some(p=>p.id===it.id)) dispatch({type:'updatePayment', item:it}); else dispatch({type:'addPayment', item:it}); setEditItem(null); }

  function purposeTone(p){
    if(p==='rent') return 'green';
    if(p==='deposit') return 'blue';
    if(p==='commission') return 'gold';
    if(p==='refund') return 'amber';
    return 'gray';
  }

  return (
    <>
      <PageHeader title={t('payments')} count={filtered.length} search={search} setSearch={setSearch}
        action={state.contracts.length>0 ? <Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addPayment')}</Button> : null} />

      {state.payments.length>0 && (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
          <Kpi tone="green" label="This month" value={fmtAed(monthTotal, lang)} sub={`${thisMonth.length} ${t('payment').toLowerCase()}s`}/>
          <Kpi tone="blue"  label="This year"  value={fmtAed(yearTotal, lang)} sub={`${thisYear.length} total`}/>
          <Kpi tone="gold"  label="Rent only (this year)" value={fmtAed(rentYearTotal, lang)} sub="excludes deposits/commission"/>
        </div>
      )}

      {state.contracts.length===0 ? (
        <Card><Empty icon="💵" title={t('empty')} hint={t('contracts')} /></Card>
      ) : filtered.length===0 ? (
        <Card><Empty icon="💵" title={t('empty')} hint={t('emptyHelp')} /></Card>
      ) : (
        <Card>
          <div className="overflow-x-auto -mx-5">
            <table className="w-full text-sm">
              <thead className="text-ink-500">
                <tr className="border-b border-ink-100">
                  <th className="text-start px-5 py-2 font-medium">{t('date')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('tenant')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('unit')}</th>
                  <th className="text-start px-3 py-2 font-medium">Purpose</th>
                  <th className="text-start px-3 py-2 font-medium">{t('method')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('reference')}</th>
                  <th className="text-end px-3 py-2 font-medium">{t('amount')}</th>
                  <th className="text-end px-5 py-2 font-medium">{t('actions')}</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>{
                  const c = state.contracts.find(x=>x.id===p.contractId);
                  const tn = c && state.tenants.find(x=>x.id===c.tenantId);
                  const u  = c && state.units.find(x=>x.id===c.unitId);
                  return (
                    <tr key={p.id} className="border-b border-ink-100 last:border-0 hover:bg-ink-100/40">
                      <td className="px-5 py-3 num">{fmtDate(p.date, lang)}</td>
                      <td className="px-3 py-3">{pickName(tn,lang) || '—'}</td>
                      <td className="px-3 py-3">{u?.label || '—'}</td>

                          <RowActions onEdit={()=>setEditItem(p)} onDelete={()=>setDeleteId(p.id)} />
                        </div>
                      </td>
                    </tr>
                  );

            </table>

                {state.contracts.map(c=>{
                  const tn=state.tenants.find(x=>x.id===c.tenantId); const u=state.units.find(x=>x.id===c.unitId);

  { en:'Paint',        ar:'دهان',          emoji:'🎨' },
  { en:'Deep clean',   ar:'تنظيف عميق',     emoji:'🧹' },

function MaintenancePage(){

      costAed:0,
      paidBy:'landlord',
      vendor:'',
      photo:'',

        </td>

  function renderTable(items){
    return (
      <Card>
        <div className="overflow-x-auto -mx-5">

            <thead className="text-ink-500">

                <th className="text-start px-3 py-2 font-medium">{t('unit')}</th>
                <th className="text-start px-3 py-2 font-medium">{t('title')}</th>
                <th className="text-start px-3 py-2 font-medium">{t('vendor')}</th>
                <th className="text-end px-3 py-2 font-medium">{t('cost')}</th>
                <th className="text-start px-3 py-2 font-medium">{t('paidBy')}</th>
                <th className="text-start px-3 py-2 font-medium">{t('status')}</th>

  return (
    <>
      <PageHeader title={t('maintenance')} count={filtered.length} search={search} setSearch={setSearch}
        action={state.units.length>0 ? <Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addMaintenance')}</Button> : null} />

      {/* KPIs */}
      {state.maintenance.length>0 && (
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
          <Kpi tone="blue"  label="Open jobs"        value={openCount} sub={openCount?'needs attention':'all clear'}/>

          <Kpi tone="gold"  label="Year landlord cost" value={fmtAed(yearLandlord, lang)}/>
          <Kpi tone="gray"  label="Year total"        value={thisYear.length} sub="jobs"/>
        </div>
      )}

      {/* Quick-add presets */}
      {state.units.length>0 && (
        <div className="mb-5">
          <div className="text-xs uppercase text-ink-500 font-medium mb-2">Quick log</div>
          <div className="flex flex-wrap gap-2">
            {MAINT_PRESETS.map(p=>(
              <button key={p.en} onClick={()=>setEditItem(blank(p))}
                className="px-3 py-2 rounded-xl bg-white border border-ink-300 hover:bg-ink-100 text-sm font-medium text-ink-900 flex items-center gap-2">
                <span>{p.emoji}</span> <span>{lang==='ar'?p.ar:p.en}</span>
              </button>

      {state.units.length===0 ? (
        <Card><Empty icon="🔧" title={t('empty')} hint={t('units')}/></Card>
      ) : filtered.length===0 ? (

      ) : (
        <div className="space-y-6">
          {openItems.length>0 && (
            <section>
              <div className="flex items-baseline justify-between mb-2 px-1">
                <h2 className="text-base font-semibold text-ink-900">Open · needs attention</h2>
                <div className="text-sm text-ink-500">{openItems.length} job{openItems.length===1?'':'s'}</div>
              </div>
              {renderTable(openItems)}
            </section>
          )}
          {doneItems.length>0 && (
            <section>
              <div className="flex items-baseline justify-between mb-2 px-1">
                <h2 className="text-base font-semibold text-ink-700">Done / cancelled</h2>
                <div className="text-sm text-ink-500">{doneItems.length}</div>
              </div>
              {renderTable(doneItems)}

      {!!editItem && (

// auto-detect kind from filename
function autoDetectKind(filename){
  const n = (filename||'').toLowerCase();
  if(/(eid|emirates[_\s-]?id|\bid\b|هوية)/.test(n)) return 'emirates_id';
  if(/(passport|جواز)/.test(n)) return 'passport';
  if(/(contract|tenancy|tawtheeq|lease|عقد|توثيق)/.test(n)) return 'contract';
  return 'other';
}

function DocumentsPage({ setRoute }){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const today = startOfDay(new Date());
  const [search, setSearch] = useState('');
  const [kindFilter, setKindFilter] = useState('');
  const [emirateFilter, setEmirateFilter] = useState('');
  const [tenantFilter, setTenantFilter] = useState('');
  const [deleteId, setDeleteId] = useState(null);
  const [previewDoc, setPreviewDoc] = useState(null);
  const fileRef = useRef(null);
  const [uploadCtx, setUploadCtx] = useState(null);

  // What emirate does a document belong to?
  function docEmirate(d){
    if(d.ownerType==='property'){ const p = state.properties.find(x=>x.id===d.ownerId); return p?.emirate || null; }
    if(d.ownerType==='unit'){ const u = state.units.find(x=>x.id===d.ownerId); const p = u && state.properties.find(x=>x.id===u.propertyId); return p?.emirate || null; }
    if(d.ownerType==='contract'){ const c = state.contracts.find(x=>x.id===d.ownerId); const u = c && state.units.find(x=>x.id===c.unitId); const p = u && state.properties.find(x=>x.id===u.propertyId); return p?.emirate || null; }
    if(d.ownerType==='tenant'){
      const tn = state.tenants.find(x=>x.id===d.ownerId);
      if(!tn) return null;
      const ac = state.contracts.find(c=>c.tenantId===tn.id && c.status==='active');
      const u = ac && state.units.find(x=>x.id===ac.unitId);
      const p = u && state.properties.find(x=>x.id===u.propertyId);
      return p?.emirate || null;
    }
    return null;
  }

  // What tenant does a document belong to (or null if not tenant/contract)
  function docTenantId(d){
    if(d.ownerType==='tenant') return d.ownerId;
    if(d.ownerType==='contract'){ const c = state.contracts.find(x=>x.id===d.ownerId); return c?.tenantId || null; }
    return null;
  }

  let items = [...state.documents].sort((a,b)=>(b.uploadedAt||'').localeCompare(a.uploadedAt||''));
  if(kindFilter) items = items.filter(d=>d.kind===kindFilter);
  if(emirateFilter) items = items.filter(d=>docEmirate(d)===emirateFilter);
  if(tenantFilter) items = items.filter(d=>docTenantId(d)===tenantFilter);
  const filtered = useFiltered(items, search, ['name']);

  // Heads-up: tenants with IDs / passports / visas expiring within 60 days
  const expiringTenants = useMemo(()=>{
    const out = [];
    state.tenants.forEach(tn=>{
      const stats = tenantStats(state, tn.id);
      if(stats.expiries.length>0) out.push({ tn, expiries: stats.expiries });
    });
    return out;
  }, [state.tenants, state.contracts, state.cheques]);

  // Group filtered docs by tenant (when no specific filter narrows it)
  const grouped = useMemo(()=>{
    const m = new Map();
    const otherKey = '__other__';
    filtered.forEach(d=>{
      const tid = docTenantId(d) || otherKey;
      if(!m.has(tid)) m.set(tid, []);
      m.get(tid).push(d);
    });
    return Array.from(m.entries()).map(([tid,list])=>{
      const tn = tid===otherKey ? null : state.tenants.find(x=>x.id===tid);
      return { tid, tenant:tn, list };
    }).sort((a,b)=>{
      if(!a.tenant) return 1;
      if(!b.tenant) return -1;
      return pickName(a.tenant,lang).localeCompare(pickName(b.tenant,lang));
    });
  }, [filtered, state.tenants, lang]);

  function startUpload(){ setUploadCtx({ ownerType:'tenant', ownerId:'', kind:'other' }); }
  function pickFile(){ fileRef.current && fileRef.current.click(); }

  function onFile(e){
    const file = e.target.files?.[0]; if(!file) return;
    if(file.size > 5*1024*1024){ alert('File too large. Keep documents under 5 MB.'); e.target.value=''; return; }
    const autoKind = autoDetectKind(file.name);
    const reader = new FileReader();
    reader.onload = () => {
      const doc = {
        id: uid('d'),
        ownerType: uploadCtx?.ownerType || 'tenant',
        ownerId: uploadCtx?.ownerId || '',
        name: file.name,
        kind: (uploadCtx?.kind && uploadCtx.kind!=='other') ? uploadCtx.kind : autoKind,
        mime: file.type || 'application/octet-stream',
        sizeBytes: file.size,
        dataUrl: reader.result,
        uploadedAt: new Date().toISOString(),
      };
      dispatch({ type:'addDocument', item: doc });
      e.target.value='';
      setUploadCtx(null);
    };
    reader.readAsDataURL(file);
  }

  function ownerLabel(d){
    if(d.ownerType==='tenant'){ const tn = state.tenants.find(x=>x.id===d.ownerId); return tn ? pickName(tn,lang) : '—'; }
    if(d.ownerType==='contract'){ const c = state.contracts.find(x=>x.id===d.ownerId); const tn=c&&state.tenants.find(x=>x.id===c.tenantId); return tn ? pickName(tn,lang) : '—'; }
    if(d.ownerType==='unit'){ const u = state.units.find(x=>x.id===d.ownerId); return u ? u.label : '—'; }
    if(d.ownerType==='property'){ const p = state.properties.find(x=>x.id===d.ownerId); return p ? pickName(p,lang) : '—'; }
    return '—';
  }

  function renderCard(d){
    const isImg = d.mime?.startsWith('image/');
    return (
      <Card key={d.id} className="overflow-hidden p-0">
        <button onClick={()=>setPreviewDoc(d)} className="block w-full aspect-video bg-ink-100 flex items-center justify-center overflow-hidden hover:opacity-90 transition">
          {isImg ? <img src={d.dataUrl} alt={d.name} className="w-full h-full object-cover"/> :
            <div className="text-center p-4"><div className="text-4xl">📄</div><div className="text-xs text-ink-500 mt-2 truncate max-w-[200px]">{d.name}</div></div>}
        </button>
        <div className="p-4">
          <div className="font-semibold text-ink-900 truncate text-sm">{d.name}</div>
          <div className="text-xs text-ink-500 mt-1">{t('doc_'+d.kind)} · {fmtBytes(d.sizeBytes)}</div>

function downloadCsv(filename, rows){
  const csv = rows.map(r => r.map(c => `"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function PnLReport({ year }){
  const { state } = useApp();
  const { t, lang } = useT();

  const monthly = useMemo(()=>{
    const months = Array.from({length:12}, (_,i)=>({ m:i, expected:0, received:0 }));
    state.cheques.forEach(ch=>{
      const d = parseISO(ch.dueDate); if(!d || d.getFullYear()!==year) return;
      months[d.getMonth()].expected += parseFloat(ch.amountAed)||0;
      if(ch.status==='cleared') months[d.getMonth()].received += parseFloat(ch.amountAed)||0;
    });
    state.payments.forEach(p=>{
      const d = parseISO(p.date); if(!d || d.getFullYear()!==year) return;
      months[d.getMonth()].received += parseFloat(p.amountAed)||0;
    });
    return months;
  }, [state, year]);

  const totals = monthly.reduce((t,m)=>({ expected:t.expected+m.expected, received:t.received+m.received }), {expected:0, received:0});
  const maxV = Math.max(1, ...monthly.map(m=>Math.max(m.expected,m.received)));
  const collectionPct = totals.expected ? Math.round(totals.received/totals.expected*100) : 0;

  const perProperty = useMemo(()=>{
    return state.properties.map(p=>{
      const unitsHere = state.units.filter(u=>u.propertyId===p.id);
      const occupied = unitsHere.filter(u=>u.status==='occupied').length;
      const contracts = state.contracts.filter(c=>unitsHere.some(u=>u.id===c.unitId));
      const cheques   = state.cheques.filter(ch=>contracts.some(c=>c.id===ch.contractId));
      const expectedYr = cheques.filter(ch=>{ const d=parseISO(ch.dueDate); return d && d.getFullYear()===year; }).reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
      const receivedYr = cheques.filter(ch=>{ const d=parseISO(ch.dueDate); return d && d.getFullYear()===year && ch.status==='cleared'; }).reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
      return { p, units: unitsHere.length, occupied, expectedYr, receivedYr };
    });
  }, [state, year]);

  function exportCsv(){
    const rows = [
      ['P&L summary', year],
      [],
      ['Month', 'Expected (AED)', 'Received (AED)', 'Collection %'],
      ...monthly.map(m=>{
        const month = new Date(year, m.m, 1).toLocaleDateString('en-GB', { month:'long' });
        const pct = m.expected ? Math.round(m.received/m.expected*100) : 0;
        return [month, m.expected, m.received, pct+'%'];
      }),
      ['TOTAL', totals.expected, totals.received, collectionPct+'%'],
      [],
      ['Per property'],
      ['Property', 'Emirate', 'Units', 'Occupied', 'Expected', 'Received'],
      ...perProperty.map(({p,units,occupied,expectedYr,receivedYr})=>[p.name, p.emirate, units, occupied, expectedYr, receivedYr]),
    ];
    downloadCsv(`pnl-${year}.csv`, rows);
  }

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Kpi tone="amber" label="Expected" value={fmtAed(totals.expected,lang)} sub={String(year)}/>
        <Kpi tone="green" label="Received" value={fmtAed(totals.received,lang)} sub={`${collectionPct}% collected`}/>
        <Kpi tone="red"   label="Gap"      value={fmtAed(Math.max(0,totals.expected-totals.received),lang)} sub="not yet received"/>
        <Kpi tone="blue"  label="Cheques cleared" value={state.cheques.filter(ch=>{const d=parseISO(ch.clearedDate||ch.dueDate); return d && d.getFullYear()===year && ch.status==='cleared'; }).length}/>
      </div>

      <Card title={`Monthly breakdown · ${year}`} action={<Button size="sm" variant="secondary" onClick={exportCsv}>⬇ CSV</Button>}>
        <div className="space-y-2">
          {monthly.map(m=>{
            const month = new Date(year, m.m, 1).toLocaleDateString(lang==='ar'?'ar-AE':'en-GB', { month:'long' });
            return (
              <div key={m.m} className="grid grid-cols-12 items-center gap-3 text-sm">
                <div className="col-span-3 sm:col-span-2 text-ink-700">{month}</div>
                <div className="col-span-7 sm:col-span-8">
                  <div className="h-6 bg-ink-100 rounded-full overflow-hidden relative">
                    <div className="absolute inset-y-0 start-0 bg-emerald-500/80" style={{ width: (m.received/maxV*100)+'%' }}/>
                    <div className="absolute inset-y-0 start-0 border-e-2 border-amber-500" style={{ width: (m.expected/maxV*100)+'%' }}/>
                  </div>
                </div>
                <div className="col-span-2 text-end num text-ink-700">{fmtAed(m.received, lang)}</div>
              </div>
            );
          })}
          <div className="text-xs text-ink-500 flex items-center gap-4 mt-2">
            <span><span className="inline-block w-3 h-3 rounded-sm bg-emerald-500/80 align-middle"/> {t('received')}</span>
            <span><span className="inline-block w-3 h-3 rounded-sm border-2 border-amber-500 align-middle"/> {t('expected')}</span>
          </div>
        </div>
      </Card>

      <Card title="Per property">
        <div className="overflow-x-auto -mx-5">
          <table className="w-full text-sm">
            <thead className="text-ink-500">
              <tr className="border-b border-ink-100">
                <th className="text-start px-5 py-2 font-medium">{t('property')}</th>
                <th className="text-start px-3 py-2 font-medium">{t('emirate')}</th>
                <th className="text-end px-3 py-2 font-medium">{t('units')}</th>
                <th className="text-end px-3 py-2 font-medium">{t('unit_occupied')}</th>
                <th className="text-end px-3 py-2 font-medium">{t('expected')}</th>
                <th className="text-end px-5 py-2 font-medium">{t('received')}</th>
              </tr>
            </thead>
            <tbody>
              {perProperty.map(({p,units,occupied,expectedYr,receivedYr})=>(
                <tr key={p.id} className="border-b border-ink-100 last:border-0">
                  <td className="px-5 py-3 font-medium text-ink-900">{pickName(p,lang)}</td>
                  <td className="px-3 py-3 text-ink-700">{p.emirate}</td>
                  <td className="px-3 py-3 text-end num">{units}</td>
                  <td className="px-3 py-3 text-end num">{occupied}</td>
                  <td className="px-3 py-3 text-end num text-amber-700">{fmtAed(expectedYr,lang)}</td>
                  <td className="px-5 py-3 text-end num font-semibold text-emerald-700">{fmtAed(receivedYr,lang)}</td>
                </tr>
              ))}
              {perProperty.length===0 && <tr><td colSpan="6" className="text-center text-ink-500 py-6">{t('empty')}</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function TenantLedgerReport({ year, tenantId, setTenantId }){
  const { state } = useApp();
  const { t, lang } = useT();
  const tn = state.tenants.find(x=>x.id===tenantId);

  // Build chronological list of cheques + payments for this tenant in the year
  const ledger = useMemo(()=>{
    if(!tenantId) return [];
    const items = [];
    const contractIds = state.contracts.filter(c=>c.tenantId===tenantId).map(c=>c.id);
    state.cheques.filter(ch=>contractIds.includes(ch.contractId)).forEach(ch=>{
      const d = parseISO(ch.clearedDate || ch.depositedDate || ch.dueDate);
      if(d && d.getFullYear()===year){
        items.push({ kind:'cheque', date:d, amount:parseFloat(ch.amountAed)||0, status:ch.status, ref:ch.chequeNo||'', bank:ch.bank||'' });
      }
    });
    state.payments.filter(p=>contractIds.includes(p.contractId)).forEach(p=>{
      const d = parseISO(p.date);
      if(d && d.getFullYear()===year){
        items.push({ kind:'payment', date:d, amount:parseFloat(p.amountAed)||0, status:'cleared', ref:p.reference||'', method:p.method, purpose:p.purpose||'rent' });
      }
    });
    items.sort((a,b)=>a.date-b.date);
    let bal = 0;
    return items.map(it=>{
      if(it.status==='cleared') bal += it.amount;
      return { ...it, balance: bal };
    });
  }, [state, tenantId, year]);

  const cleared = ledger.filter(it=>it.status==='cleared').reduce((s,it)=>s+it.amount,0);
  const pending = ledger.filter(it=>it.status==='pending' || it.status==='bounced').reduce((s,it)=>s+it.amount,0);

  function exportCsv(){
    if(!tn) return;
    const rows = [
      ['Tenant ledger', pickName(tn,'en'), year],
      [],
      ['Date', 'Type', 'Reference', 'Status', 'Amount (AED)', 'Running balance'],
      ...ledger.map(it=>[
        toISODate(it.date),
        it.kind==='cheque' ? `Cheque (${it.bank||''} #${it.ref||''})` : `${it.method||'payment'}${it.purpose?' / '+it.purpose:''}`,
        it.ref,
        it.status,
        it.amount,
        it.balance,
      ]),
      [],
      ['Cleared total', '', '', '', cleared],
      ['Pending / bounced', '', '', '', pending],
    ];
    downloadCsv(`ledger-${pickName(tn,'en').replace(/\s+/g,'_')}-${year}.csv`, rows);
  }

  return (
    <div className="space-y-6">
      <Card>
        <Field label="Select tenant">
          <Select value={tenantId} onChange={e=>setTenantId(e.target.value)}>
            <option value="">{t('select')}</option>
            {state.tenants.map(tn=>(<option key={tn.id} value={tn.id}>{pickName(tn,lang)}</option>))}
          </Select>
        </Field>
      </Card>

      {!tn ? (
        <Card><Empty icon="👥" title="Pick a tenant" hint="Select a tenant above to see their ledger."/></Card>
      ) : (
        <>
          <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
            <Kpi tone="green" label={`${year} cleared`} value={fmtAed(cleared,lang)}/>
            <Kpi tone="amber" label={`${year} pending`} value={fmtAed(pending,lang)}/>
            <Kpi tone="blue"  label="Reliability"     value={(tenantStats(state,tn.id).reliability ?? 0)+'%'} sub={tenantStats(state,tn.id).reliabilityLabel}/>
          </div>

          <Card title={`${pickName(tn,lang)} · ${year}`} action={<Button size="sm" variant="secondary" onClick={exportCsv}>⬇ CSV</Button>}>
            {ledger.length===0 ? <div className="text-ink-500 text-sm">No activity in {year}.</div> : (
              <div className="overflow-x-auto -mx-5">
                <table className="w-full text-sm">
                  <thead className="text-ink-500">
                    <tr className="border-b border-ink-100">
                      <th className="text-start px-5 py-2 font-medium">{t('date')}</th>
                      <th className="text-start px-3 py-2 font-medium">{t('kind')}</th>
                      <th className="text-start px-3 py-2 font-medium">{t('reference')}</th>
                      <th className="text-start px-3 py-2 font-medium">{t('status')}</th>
                      <th className="text-end px-3 py-2 font-medium">{t('amount')}</th>
                      <th className="text-end px-5 py-2 font-medium">Running balance</th>
                    </tr>
                  </thead>
                  <tbody>
                    {ledger.map((it,i)=>(
                      <tr key={i} className="border-b border-ink-100 last:border-0">
                        <td className="px-5 py-3 num">{fmtDate(toISODate(it.date), lang)}</td>
                        <td className="px-3 py-3">{it.kind==='cheque' ? `🧾 ${it.bank||''} #${it.ref||'—'}` : `💵 ${it.method||''}${it.purpose && it.purpose!=='rent' ? ' · '+it.purpose : ''}`}</td>
                        <td className="px-3 py-3 num text-ink-500">{it.ref || '—'}</td>
                        <td className="px-3 py-3"><Badge tone={it.status==='cleared'?'green':it.status==='bounced'?'red':'amber'}>{it.status}</Badge></td>
                        <td className="px-3 py-3 text-end num font-semibold">{fmtAed(it.amount,lang)}</td>
                        <td className="px-5 py-3 text-end num text-emerald-700">{fmtAed(it.balance,lang)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </Card>
        </>
      )}
    </div>
  );
}

function BouncedReport({ year }){
  const { state } = useApp();
  const { t, lang } = useT();

  const bouncedThis = useMemo(()=>{
    return state.cheques.filter(ch=>{
      if(ch.status!=='bounced') return false;
      const d = parseISO(ch.depositedDate || ch.dueDate);
      return d && d.getFullYear()===year;
    });
  }, [state.cheques, year]);

function OccupancyReport({ year }){
  const { state } = useApp();
  const { t, lang } = useT();

  const yStart = new Date(year, 0, 1);
  const yEnd   = new Date(year+1, 0, 1);
  const yearDays = daysBetween(yStart, yEnd);

  const rows = useMemo(()=>{
    return state.units.map(u=>{
      const p = state.properties.find(x=>x.id===u.propertyId);
      const contracts = state.contracts.filter(c=>c.unitId===u.id);
      let occDays = 0;
      contracts.forEach(c=>{
        const s = parseISO(c.startDate); const e = parseISO(c.endDate);
        if(!s || !e) return;
        const ovStart = s > yStart ? s : yStart;
        const ovEnd   = e < yEnd   ? e : yEnd;
        if(ovStart < ovEnd) occDays += daysBetween(ovStart, ovEnd);
      });
      occDays = Math.min(occDays, yearDays);
      const vacDays = yearDays - occDays;
      const pct = Math.round((occDays/yearDays)*100);
      return { u, p, occDays, vacDays, pct };
    });
  }, [state, year, yearDays]);

  const totalOccDays = rows.reduce((s,r)=>s+r.occDays, 0);
  const totalDays = rows.length * yearDays;
  const portfolioPct = totalDays ? Math.round(totalOccDays/totalDays*100) : 0;

  function exportCsv(){
    const out = [
      ['Occupancy report', year],
      [],
      ['Property','Unit','Occupied days','Vacant days','Occupancy %'],
      ...rows.map(r=>[r.p?.name||'', r.u.label, r.occDays, r.vacDays, r.pct+'%']),
      [],
      ['Portfolio average', '', totalOccDays, totalDays-totalOccDays, portfolioPct+'%'],
    ];
    downloadCsv(`occupancy-${year}.csv`, out);
  }

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
        <Kpi tone="green" label="Portfolio occupancy" value={portfolioPct+'%'} sub={`${rows.length} units · ${year}`}/>
        <Kpi tone="amber" label="Total vacant days" value={(totalDays-totalOccDays).toLocaleString()} />
        <Kpi tone="blue"  label="Total occupied days" value={totalOccDays.toLocaleString()} />
      </div>
      <Card title="Per unit" action={<Button size="sm" variant="secondary" onClick={exportCsv}>⬇ CSV</Button>}>
        {rows.length===0 ? <div className="text-ink-500 text-sm">{t('empty')}</div> : (
          <div className="overflow-x-auto -mx-5">
            <table className="w-full text-sm">
              <thead className="text-ink-500">
                <tr className="border-b border-ink-100">
                  <th className="text-start px-5 py-2 font-medium">{t('property')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('unit')}</th>
                  <th className="text-end px-3 py-2 font-medium">Occupied days</th>
                  <th className="text-end px-3 py-2 font-medium">Vacant days</th>
                  <th className="text-end px-5 py-2 font-medium">Occupancy %</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r=>(
                  <tr key={r.u.id} className="border-b border-ink-100 last:border-0">
                    <td className="px-5 py-3 font-medium text-ink-900">{pickName(r.p,lang)}</td>
                    <td className="px-3 py-3">{r.u.label}</td>
                    <td className="px-3 py-3 text-end num text-emerald-700">{r.occDays}</td>
                    <td className="px-3 py-3 text-end num text-amber-700">{r.vacDays}</td>
                    <td className="px-5 py-3 text-end font-semibold num">{r.pct}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

  const [showReceipt, setShowReceipt] = useState(false);

    const json = localStorage.getItem(STORAGE_KEY) || '';
    const bytes = new Blob([json]).size;
    return {
      bytes,
      properties: state.properties.length,
      units:       state.units.length,
      tenants:     state.tenants.length,
      contracts:   state.contracts.length,
      cheques:     state.cheques.length,
      payments:    state.payments.length,
      maintenance: state.maintenance.length,
      documents:   state.documents.length,
    };
  }, [state]);

  // Backup age
  const lastBackup = state.settings.lastBackupAt;
  const today = startOfDay(new Date());
  const backupDays = lastBackup ? daysBetween(parseISO(lastBackup.slice(0,10)), today) : null;
  const backupTone = backupDays==null ? 'red' : backupDays>=14 ? 'red' : backupDays>=7 ? 'amber' : 'green';
  const backupLabel = backupDays==null ? 'Never backed up' :
                       backupDays===0 ? 'Backed up today' :
                       backupDays===1 ? 'Backed up yesterday' :
                       `Backed up ${backupDays} days ago`;

  function exportAll(){
    const data = { ...state, settings:{ ...state.settings, lastBackupAt: new Date().toISOString() } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `rent-manager-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    dispatch({ type:'setSettings', patch:{ lastBackupAt: new Date().toISOString() } });
  }
  function importPick(){ fileRef.current && fileRef.current.click(); }
  function onImport(e){
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(!data.version || !Array.isArray(data.properties)) throw new Error('bad shape');
        if(!confirm('Importing will replace all current data. Continue?')) return;
        dispatch({ type:'set', state: data });
        alert('Import successful.');
      } catch(err){ alert('Could not import: '+err.message); }
      e.target.value='';
    };
    reader.readAsText(file);
  }

    id: 'ch_TEST',
    contractId: '__test__',
    chequeNo: '123456',
    bank: 'Sample Bank',
    dueDate: todayISO(),

    status: 'cleared',

  const testContract = state.contracts[0] || { startDate:todayISO(), endDate:toISODate(addMonths(new Date(),12)), tawtheeqNo:'TST-SAMPLE-001' };
  const testUnit = state.units[0] || { label:'Sample Unit', kind:'apartment' };
  const testProperty = state.properties[0] || { name:'Sample Property', area:'Test Area', emirate:'Abu Dhabi' };

  return (

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return DEFAULT_STATE();
    const parsed = JSON.parse(raw);
    // shallow-merge with defaults so newly-added keys appear
    const def = DEFAULT_STATE();
    return {
      ...def, ...parsed,
      settings:{ ...def.settings, ...(parsed.settings||{}) }
    };
  } catch(e){
    console.error('Failed to load state', e);
    return DEFAULT_STATE();
  }
}
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('Failed to save state', e); alert('Could not save. Browser storage may be full.'); }
}

// ---------- Reducer / Context --------------------------------------------

function uid(prefix='id'){
  return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
}

function reducer(state, action){
  switch(action.type){
    case 'set': return action.state;
    case 'setSettings': return { ...state, settings:{ ...state.settings, ...action.patch } };

    case 'addProperty':    return { ...state, properties:[...state.properties, action.item] };
    case 'updateProperty': return { ...state, properties: state.properties.map(p=>p.id===action.item.id?action.item:p) };
    case 'deleteProperty': {
      const unitsToRemove = state.units.filter(u=>u.propertyId===action.id).map(u=>u.id);
      return {
        ...state,
        properties: state.properties.filter(p=>p.id!==action.id),
        units: state.units.filter(u=>u.propertyId!==action.id),
        contracts: state.contracts.filter(c=>!unitsToRemove.includes(c.unitId)),
        cheques: state.cheques.filter(ch=>!state.contracts.filter(c=>unitsToRemove.includes(c.unitId)).map(c=>c.id).includes(ch.contractId)),
        maintenance: state.maintenance.filter(m=>!unitsToRemove.includes(m.unitId)),
      };
    }

    case 'addUnit':    return { ...state, units:[...state.units, action.item] };
    case 'updateUnit': return { ...state, units: state.units.map(u=>u.id===action.item.id?action.item:u) };
    case 'deleteUnit': {
      const contractsToRemove = state.contracts.filter(c=>c.unitId===action.id).map(c=>c.id);
      return {
        ...state,
        units: state.units.filter(u=>u.id!==action.id),
        contracts: state.contracts.filter(c=>c.unitId!==action.id),
        cheques: state.cheques.filter(ch=>!contractsToRemove.includes(ch.contractId)),
        maintenance: state.maintenance.filter(m=>m.unitId!==action.id),
      };
    }

    case 'addTenant':    return { ...state, tenants:[...state.tenants, action.item] };
    case 'updateTenant': return { ...state, tenants: state.tenants.map(t=>t.id===action.item.id?action.item:t) };
    case 'deleteTenant': return { ...state, tenants: state.tenants.filter(t=>t.id!==action.id) };

    case 'addContract':    return { ...state, contracts:[...state.contracts, action.item] };
    case 'updateContract': return { ...state, contracts: state.contracts.map(c=>c.id===action.item.id?action.item:c) };
    case 'deleteContract': return {
      ...state,
      contracts: state.contracts.filter(c=>c.id!==action.id),
      cheques: state.cheques.filter(ch=>ch.contractId!==action.id),
      payments: state.payments.filter(p=>p.contractId!==action.id),
    };

    case 'addCheques':     return { ...state, cheques:[...state.cheques, ...action.items] };
    case 'addCheque':      return { ...state, cheques:[...state.cheques, action.item] };
    case 'updateCheque':   return { ...state, cheques: state.cheques.map(c=>c.id===action.item.id?action.item:c) };
    case 'deleteCheque':   return { ...state, cheques: state.cheques.filter(c=>c.id!==action.id) };

    case 'addPayment':     return { ...state, payments:[...state.payments, action.item] };
    case 'updatePayment':  return { ...state, payments: state.payments.map(p=>p.id===action.item.id?action.item:p) };
    case 'deletePayment':  return { ...state, payments: state.payments.filter(p=>p.id!==action.id) };

    case 'addDocument':    return { ...state, documents:[...state.documents, action.item] };
    case 'deleteDocument': return { ...state, documents: state.documents.filter(d=>d.id!==action.id) };

    case 'addMaintenance':    return { ...state, maintenance:[...state.maintenance, action.item] };
    case 'updateMaintenance': return { ...state, maintenance: state.maintenance.map(m=>m.id===action.item.id?action.item:m) };
    case 'deleteMaintenance': return { ...state, maintenance: state.maintenance.filter(m=>m.id!==action.id) };

    case 'resetAll': return DEFAULT_STATE();
    default: return state;
  }
}

// ---------- Utilities ----------------------------------------------------

const todayISO = () => new Date().toISOString().slice(0,10);
const startOfDay = d => { const x=new Date(d); x.setHours(0,0,0,0); return x; };

function parseISO(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d; }
function toISODate(d){ if(!d) return ''; const x=new Date(d); if(isNaN(x))return ''; const y=x.getFullYear(); const m=String(x.getMonth()+1).padStart(2,'0'); const day=String(x.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function fmtDate(s, lang='en'){
  const d = parseISO(s); if(!d) return '—';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  return `${dd}/${mm}/${yy}`;
}
function daysBetween(a, b){ // returns integer days from a to b (b-a). negative if b before a
  const ms = startOfDay(b)-startOfDay(a);
  return Math.round(ms/86400000);
}
function addMonths(d, n){ const x=new Date(d); const day=x.getDate(); x.setDate(1); x.setMonth(x.getMonth()+n); const last=new Date(x.getFullYear(),x.getMonth()+1,0).getDate(); x.setDate(Math.min(day,last)); return x; }
function fmtAed(n, lang='en'){
  if(n==null||isNaN(n)) return '—';
  const s = Number(n).toLocaleString(lang==='ar'?'ar-AE':'en-US', { maximumFractionDigits:2 });
  return s + ' ' + (lang==='ar'?'د.إ':'AED');
}
function fmtBytes(n){
  if(!n) return '—';
  if(n<1024) return n+' B';
  if(n<1024*1024) return (n/1024).toFixed(1)+' KB';
  return (n/1024/1024).toFixed(2)+' MB';
}
function classNames(...xs){ return xs.filter(Boolean).join(' '); }

// Phone split: detect +XXX prefix, return [code, restOfNumber]
function splitPhone(phone){
  const s = String(phone||'').trim();
  if(!s) return ['+971',''];
  // try the codes from longest first to avoid +9 matching when +971 is the intent
  const codes = COUNTRY_CODES.map(c=>c.code).sort((a,b)=>b.length-a.length);
  for(const code of codes){
    if(s.startsWith(code)) return [code, s.slice(code.length).trim()];
  }
  // generic +DDDD prefix
  const m = s.match(/^(\+\d{1,4})\s*(.*)$/);
  if(m) return [m[1], m[2].trim()];
  return ['+971', s];
}
function joinPhone(code, num){
  const c = code || '+971';
  const n = String(num||'').replace(/^\+\d+\s*/,'').trim();
  return n ? c+n : '';
}

function PhoneInput({ value, onChange, placeholder }){
  const [code, num] = splitPhone(value);
  return (
    <div className="flex gap-2">
      <select value={code} onChange={e=>onChange(joinPhone(e.target.value, num))}
        className="px-2 py-2.5 rounded-xl border border-ink-300 bg-white text-sm w-[7rem] focus:border-gold-500 focus:ring-0">
        {COUNTRY_CODES.map(c => <option key={c.code+c.name} value={c.code}>{c.flag} {c.code}</option>)}
      </select>
      <input type="tel" inputMode="tel" value={num}
        onChange={e=>onChange(joinPhone(code, e.target.value))}
        placeholder={placeholder || '5X XXX XXXX'}
        className="flex-1 px-3 py-2.5 rounded-xl border border-ink-300 bg-white focus:border-gold-500 focus:ring-0 num"/>
    </div>
  );
}

// pick name based on language
function pickName(obj, lang){
  if(!obj) return '';
  if(lang==='ar' && obj.nameAr) return obj.nameAr;
  return obj.name || obj.nameAr || '';
}

// build cheque schedule for a contract: annualRent split into numCheques across startDate→endDate
function buildChequeSchedule(contract){
  const n = Math.max(1, Math.min(12, parseInt(contract.numCheques||1,10)));
  const start = parseISO(contract.startDate); if(!start) return [];
  const end   = parseISO(contract.endDate)   || addMonths(start,12);
  const monthsTotal = Math.max(1, Math.round(daysBetween(start,end)/30.44));
  const monthStep = Math.max(1, Math.round(monthsTotal/n));
  const total = parseFloat(contract.annualRentAed||0);
  const per = Math.round((total/n)*100)/100;
  const items = [];
  for(let i=0;i<n;i++){
    const due = addMonths(start, i*monthStep);
    // last cheque takes the rounding remainder
    const amount = (i===n-1) ? Math.round((total - per*(n-1))*100)/100 : per;
    items.push({
      id: uid('ch'),
      contractId: contract.id,
      chequeNo:'',
      bank:'',
      dueDate: toISODate(due),
      amountAed: amount,
      status:'pending',
      depositedDate:null, clearedDate:null,
      replacedByChequeId:null,
      notes:'',
    });
  }
  return items;
}

// ---------- I18n hook -----------------------------------------------------

function useT(){
  const { state } = useApp();
  const lang = state.settings.lang || 'en';
  const t = useCallback((k, fallback) => {
    const v = TR[lang]?.[k];
    return v ?? TR.en[k] ?? fallback ?? k;
  }, [lang]);
  return { t, lang, isAr: lang==='ar' };
}

function Button({ children, onClick, variant='primary', size='md', icon, type='button', className='', disabled=false, title }){
  const base = 'inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition active:scale-[.98] disabled:opacity-50 disabled:cursor-not-allowed';
  const sizes = { sm:'text-sm px-3 py-1.5', md:'text-sm px-4 py-2.5', lg:'text-base px-5 py-3' };
  const variants = {
    primary:'bg-ink-900 text-white hover:bg-ink-700 shadow-sm',
    secondary:'bg-white text-ink-900 border border-ink-300 hover:bg-ink-100',
    gold:'bg-gold-500 text-white hover:bg-gold-600 shadow-sm',
    ghost:'bg-transparent text-ink-700 hover:bg-ink-100',
    danger:'bg-red-600 text-white hover:bg-red-700',
    success:'bg-emerald-600 text-white hover:bg-emerald-700',
  };
  return (
    <button type={type} title={title} onClick={onClick} disabled={disabled}
      className={classNames(base, sizes[size], variants[variant], className)}>
      {icon && <span aria-hidden>{icon}</span>}
      <span>{children}</span>
    </button>
  );
}

function Modal({ open, onClose, title, children, size='md' }){
  useEffect(()=>{
    if(!open) return;
    const onKey = e => { if(e.key==='Escape') onClose?.(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow='hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
  },[open,onClose]);
  if(!open) return null;
  const sizes = { sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl', xl:'max-w-6xl' };
  return (
    <div className="fixed inset-0 z-50 bg-ink-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4 no-print"
         onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        className={classNames('bg-white w-full rounded-t-3xl sm:rounded-2xl shadow-2xl border border-ink-100 max-h-[92vh] flex flex-col', sizes[size])}>
        <div className="px-5 py-4 border-b border-ink-100 flex items-center justify-between">
          <h3 className="font-semibold text-ink-900">{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-ink-100 text-ink-500" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div className="overflow-y-auto p-5">{children}</div>
      </div>
    </div>
  );
}

function ConfirmDialog({ open, onConfirm, onCancel, message, confirmLabel, cancelLabel, danger=true }){
  const { t } = useT();
  if(!open) return null;
  return (
    <Modal open={open} onClose={onCancel} title={t('confirm')} size="sm">
      <p className="text-ink-700">{message}</p>
      <div className="mt-5 flex gap-2 justify-end">
        <Button variant="secondary" onClick={onCancel}>{cancelLabel || t('cancel')}</Button>
        <Button variant={danger?'danger':'primary'} onClick={onConfirm}>{confirmLabel || t('confirm')}</Button>
      </div>
    </Modal>
  );
}

function Empty({ icon='📭', title, hint, action }){

// ---------- Dashboard ----------------------------------------------------

function Dashboard({ setRoute }){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const today = startOfDay(new Date());
  const reminderDays = state.settings.reminderDaysAhead || 14;
  const [emirate, setEmirate] = useState('');   // '' = all

  // Helper: does a cheque belong to a unit in the selected emirate?
  function chequeMatchesEmirate(ch){
    if(!emirate) return true;
    const c = state.contracts.find(x=>x.id===ch.contractId); if(!c) return true;
    const u = state.units.find(x=>x.id===c.unitId); if(!u) return true;
    const p = state.properties.find(x=>x.id===u.propertyId); if(!p) return true;
    return p.emirate === emirate;
  }
  function contractMatchesEmirate(c){
    if(!emirate) return true;
    const u = state.units.find(x=>x.id===c.unitId); if(!u) return true;
    const p = state.properties.find(x=>x.id===u.propertyId); if(!p) return true;
    return p.emirate === emirate;
  }
  function unitMatchesEmirate(u){
    if(!emirate) return true;
    const p = state.properties.find(x=>x.id===u.propertyId); if(!p) return true;
    return p.emirate === emirate;
  }
  function maintMatchesEmirate(m){
    if(!emirate) return true;
    const u = state.units.find(x=>x.id===m.unitId); if(!u) return true;
    const p = state.properties.find(x=>x.id===u.propertyId); if(!p) return true;
    return p.emirate === emirate;
  }

  const stats = useMemo(()=>{
    const units = state.units.filter(unitMatchesEmirate);
    const occupied = units.filter(u=>u.status==='occupied').length;
    const vacant = units.filter(u=>u.status==='vacant').length;
    const tm = new Date(); tm.setDate(1); tm.setHours(0,0,0,0);
    const nm = new Date(tm); nm.setMonth(nm.getMonth()+1);
    const thisMonthCheques = state.cheques.filter(ch=>{
      const d = parseISO(ch.dueDate);
      return d && d>=tm && d<nm && chequeMatchesEmirate(ch);
    });
    const monthIncome = thisMonthCheques.reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
    const overdueCheques = state.cheques.filter(ch=>{
      const d=parseISO(ch.dueDate);
      return d && d<today && (ch.status==='pending'||ch.status==='bounced') && chequeMatchesEmirate(ch);
    });
    return { totalUnits:units.length, occupied, vacant, monthIncome, overdueCheques };
  }, [state, today, emirate]);

  const upcoming = useMemo(()=>{
    const cutoff = new Date(today); cutoff.setDate(cutoff.getDate()+reminderDays);
    return state.cheques
      .filter(ch=>{
        const d = parseISO(ch.dueDate);
        return d && d>=today && d<=cutoff && ch.status==='pending' && chequeMatchesEmirate(ch);
      })
      .sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
      .slice(0,10);
  }, [state.cheques, today, reminderDays, emirate]);

  const expiring = useMemo(()=>{
    const cutoff = new Date(today); cutoff.setDate(cutoff.getDate()+60);
    return state.contracts
      .filter(c=>{
        const d = parseISO(c.endDate);
        return d && c.status==='active' && d<=cutoff && d>=today && contractMatchesEmirate(c);
      })
      .sort((a,b)=>a.endDate.localeCompare(b.endDate))
      .slice(0,10);
  }, [state.contracts, today, emirate]);

  const recentMaint = useMemo(()=>{
    return [...state.maintenance].filter(maintMatchesEmirate).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  }, [state.maintenance, emirate]);

  function unitAndTenant(contractId){
    const c = state.contracts.find(x=>x.id===contractId);
    const u = c && state.units.find(x=>x.id===c.unitId);
    const ten = c && state.tenants.find(x=>x.id===c.tenantId);
    const p = u && state.properties.find(x=>x.id===u.propertyId);
    return { c, u, ten, p };
  }

  function setChequeStatus(ch, status){
    const patch = { ...ch, status };
    if(status==='deposited' && !patch.depositedDate) patch.depositedDate = todayISO();
    if(status==='cleared'   && !patch.clearedDate)   patch.clearedDate   = todayISO();
    dispatch({ type:'updateCheque', item: patch });
  }

  return (
    <div className="space-y-6">
      {/* Welcome */}
      <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3">
        <div>
          <div className="text-ink-500 text-sm">{t('welcome')}{state.settings.landlordName?', '+(lang==='ar'?(state.settings.landlordNameAr||state.settings.landlordName):state.settings.landlordName):''}</div>
          <h1 className="text-2xl sm:text-3xl font-bold text-ink-900">{t('overview')}</h1>
        </div>
        <div className="flex items-center gap-3">
          <div className="inline-flex rounded-xl bg-ink-100 p-1 text-sm">
            <button onClick={()=>setEmirate('')}
              className={classNames('px-3 py-1.5 rounded-lg font-medium transition', emirate===''?'bg-white text-ink-900 shadow':'text-ink-500 hover:text-ink-900')}>{t('all')}</button>
            <button onClick={()=>setEmirate('Abu Dhabi')}
              className={classNames('px-3 py-1.5 rounded-lg font-medium transition', emirate==='Abu Dhabi'?'bg-white text-ink-900 shadow':'text-ink-500 hover:text-ink-900')}>Abu Dhabi</button>
            <button onClick={()=>setEmirate('Al Ain')}
              className={classNames('px-3 py-1.5 rounded-lg font-medium transition', emirate==='Al Ain'?'bg-white text-ink-900 shadow':'text-ink-500 hover:text-ink-900')}>Al Ain</button>
          </div>
          <div className="text-ink-500 text-sm hidden sm:block">{new Date().toLocaleDateString(lang==='ar'?'ar-AE':'en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <Kpi tone="blue" label={t('kpi_units')}    value={stats.totalUnits} sub={`${stats.occupied} ${t('unit_occupied').toLowerCase()} · ${stats.vacant} ${t('unit_vacant').toLowerCase()}`} />
        <Kpi tone="green" label={t('kpi_occupied')} value={stats.occupied} sub={stats.totalUnits? Math.round(stats.occupied/stats.totalUnits*100)+'%':'—'} />
        <Kpi tone="amber" label={t('kpi_monthIncome')} value={fmtAed(stats.monthIncome, lang)} />
        <Kpi tone="red" label={t('kpi_overdue')} value={stats.overdueCheques.length} sub={fmtAed(stats.overdueCheques.reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0), lang)} />
      </div>

      {/* Quick actions */}
      <Card title={t('quickActions')}>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <Button variant="secondary" icon={<I.users/>} onClick={()=>setRoute('tenants')}>{t('qa_addTenant')}</Button>
          <Button variant="secondary" icon={<I.file/>}  onClick={()=>setRoute('contracts')}>{t('qa_addContract')}</Button>
          <Button variant="secondary" icon={<I.cheque/>} onClick={()=>setRoute('cheques')}>{t('qa_logCheque')}</Button>
          <Button variant="secondary" icon={<I.wrench/>} onClick={()=>setRoute('maintenance')}>{t('qa_logMaintenance')}</Button>
        </div>
      </Card>

      <div className="grid lg:grid-cols-2 gap-6">
        <Card title={t('upcomingCheques')}>
          {upcoming.length===0 ? (
            <div className="text-ink-500 text-sm">{t('nothingDue')}</div>
          ) : (
            <ul className="divide-y divide-ink-100">
              {upcoming.map(ch=>{
                const {u,ten,p} = unitAndTenant(ch.contractId);
                const days = daysBetween(today, parseISO(ch.dueDate));
                return (
                  <li key={ch.id} className="py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-3">
                    <div className="min-w-0 flex-1">
                      <div className="font-medium text-ink-900 truncate">
                        {pickName(ten,lang) || '—'} · {u?.label || '—'}
                      </div>
                      <div className="text-xs text-ink-500 truncate">{pickName(p,lang)} · {fmtDate(ch.dueDate, lang)}</div>
                    </div>
                    <div className="flex items-center justify-between sm:justify-end gap-3">
                      <div className="text-end">
                        <div className="font-semibold text-ink-900 num">{fmtAed(ch.amountAed, lang)}</div>
                        <div className="text-xs"><Badge tone={days<=3?'red':days<=7?'amber':'gray'}>{days===0?t('today'):days===1?t('tomorrow'):`${t('dueIn')} ${days} ${t('daysLeft')}`}</Badge></div>
                      </div>
                      <div className="flex items-center gap-1">
                        <button onClick={()=>setChequeStatus(ch,'deposited')} title={t('markDeposited')}
                          className="px-2 py-1.5 rounded-lg bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-medium">
                          ↑ {t('markDeposited').split(' ')[1] || t('markDeposited')}
                        </button>
                        <button onClick={()=>setChequeStatus(ch,'bounced')} title={t('markBounced')}
                          className="px-2 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-700 text-xs font-medium">
                          ✗
                        </button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>

        <Card title={t('overdueCheques')}>
          {stats.overdueCheques.length===0 ? (
            <div className="text-ink-500 text-sm">{t('nothingDue')}</div>
          ) : (
            <ul className="divide-y divide-ink-100">
              {stats.overdueCheques.slice(0,10).map(ch=>{
                const {u,ten,p} = unitAndTenant(ch.contractId);
                const days = daysBetween(parseISO(ch.dueDate), today);
                return (
                  <li key={ch.id} className="py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-3">
                    <div className="min-w-0 flex-1">
                      <div className="font-medium text-ink-900 truncate">{pickName(ten,lang)||'—'} · {u?.label||'—'}</div>
                      <div className="text-xs text-ink-500 truncate">{pickName(p,lang)} · {fmtDate(ch.dueDate, lang)}</div>
                    </div>
                    <div className="flex items-center justify-between sm:justify-end gap-3">
                      <div className="text-end">
                        <div className="font-semibold text-ink-900 num">{fmtAed(ch.amountAed, lang)}</div>
                        <Badge tone="red">{`${days} ${t('daysOverdue')}`}</Badge>
                      </div>
                      <div className="flex items-center gap-1">
                        <button onClick={()=>setChequeStatus(ch,'deposited')} title={t('markDeposited')}
                          className="px-2 py-1.5 rounded-lg bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-medium">↑</button>
                        <button onClick={()=>setChequeStatus(ch,'cleared')} title={t('markCleared')}
                          className="px-2 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium">✓</button>
                        <button onClick={()=>setChequeStatus(ch,'bounced')} title={t('markBounced')}
                          className="px-2 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-700 text-xs font-medium">✗</button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>

        <Card title={t('expiringContracts')}>
          {expiring.length===0 ? (
            <div className="text-ink-500 text-sm">{t('nothingDue')}</div>
          ) : (
            <ul className="divide-y divide-ink-100">
              {expiring.map(c=>{
                const u = state.units.find(x=>x.id===c.unitId);
                const p = u && state.properties.find(x=>x.id===u.propertyId);
                const ten = state.tenants.find(x=>x.id===c.tenantId);
                const days = daysBetween(today, parseISO(c.endDate));
                return (
                  <li key={c.id} className="py-3 flex items-center justify-between gap-3">
                    <div className="min-w-0">
                      <div className="font-medium text-ink-900 truncate">{pickName(ten,lang)||'—'} · {u?.label||'—'}</div>
                      <div className="text-xs text-ink-500 truncate">{pickName(p,lang)} · {fmtDate(c.endDate, lang)}</div>
                    </div>
                    <Badge tone={days<=14?'red':days<=30?'amber':'gray'}>{`${days} ${t('daysLeft')}`}</Badge>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>

        <Card title={t('recentMaintenance')}>
          {recentMaint.length===0 ? (
            <div className="text-ink-500 text-sm">{t('empty')}</div>
          ) : (
            <ul className="divide-y divide-ink-100">
              {recentMaint.map(m=>{
                const u = state.units.find(x=>x.id===m.unitId);
                const p = u && state.properties.find(x=>x.id===u.propertyId);
                return (
                  <li key={m.id} className="py-3 flex items-center justify-between gap-3">
                    <div className="min-w-0">
                      <div className="font-medium text-ink-900 truncate">{m.title}</div>
                      <div className="text-xs text-ink-500 truncate">{pickName(p,lang)} · {u?.label} · {fmtDate(m.date, lang)}</div>
                    </div>
                    <Badge tone={m.status==='done'?'green':m.status==='in_progress'?'amber':m.status==='cancelled'?'gray':'blue'}>
                      {t('maint_'+m.status)}
                    </Badge>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      </div>
    </div>
  );
}

function Kpi({ tone='gray', label, value, sub }){
  const tones = {
    blue:'from-sky-50 to-white border-sky-200',
    green:'from-emerald-50 to-white border-emerald-200',
    amber:'from-amber-50 to-white border-amber-200',
    red:'from-red-50 to-white border-red-200',
    gray:'from-ink-50 to-white border-ink-200',
  };
  return (
    <div className={classNames('p-4 rounded-2xl border bg-gradient-to-b shadow-card', tones[tone]||tones.gray)}>
      <div className="text-xs text-ink-500 font-medium uppercase tracking-wide">{label}</div>
      <div className="text-2xl font-bold text-ink-900 mt-1 num">{value}</div>
      {sub && <div className="text-xs text-ink-500 mt-1">{sub}</div>}
    </div>
  );
}

    <div className="flex items-center gap-1 justify-end">
      {onEdit   && <button onClick={onEdit}   title={t('edit')}   className="p-2 rounded-lg hover:bg-ink-100 text-ink-700"><I.edit/></button>}

    </div>

function useFiltered(items, search, fields){
  return useMemo(()=>{
    const q = (search||'').trim().toLowerCase();
    if(!q) return items;
    return items.filter(it => fields.some(f => String(it[f]||'').toLowerCase().includes(q)));
  }, [items, search, JSON.stringify(fields)]);
}

function PropertiesPage({ setRoute }){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);

  function save(item){
    if(state.properties.some(p=>p.id===item.id))
      dispatch({ type:'updateProperty', item });
    else
      dispatch({ type:'addProperty', item });
    setEditItem(null);
  }

  // Group by emirate, preserving the standard order
  const groups = useMemo(()=>{
    const m = {};

    return EMIRATES.filter(e=>m[e]?.length).map(e=>({ emirate:e, items:m[e] }));
  }, [filtered]);

  function renderCard(p){
    const stats = propertyStats(state, p.id);

          ) : (
            <div className="w-full h-full flex items-center justify-center text-5xl opacity-60">🏠</div>

          </div>
          <div className="mt-4 grid grid-cols-4 gap-1 text-center">
            <div><div className="text-lg font-bold text-ink-900 num">{stats.unitsHere.length}</div><div className="text-[10px] text-ink-500 uppercase">{t('units')}</div></div>
            <div><div className="text-lg font-bold text-emerald-700 num">{stats.occupied}</div><div className="text-[10px] text-ink-500 uppercase">{t('unit_occupied')}</div></div>

  return (
    <>
      <PageHeader title={t('properties')} count={filtered.length} search={search} setSearch={setSearch}
        action={<Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addProperty')}</Button>} />

      {filtered.length===0 ? (
        <Card>

  );
}

  const p = state.properties.find(x=>x.id===id);
  const [editing, setEditing] = useState(false);
  const [deleting, setDeleting] = useState(false);

  if(!p){
    return (
      <div className="text-center py-20">
        <h2 className="text-xl font-semibold text-ink-900">Property not found.</h2>
        <Button className="mt-4" variant="secondary" onClick={()=>setRoute('properties')}>← Back to properties</Button>
      </div>
    );
  }

  const stats = propertyStats(state, id);
  const collectionPct = stats.expectedYr ? Math.round(stats.receivedYr/stats.expectedYr*100) : 0;

  const tenantsHere = stats.activeContracts.map(c=>{
    const u = state.units.find(x=>x.id===c.unitId);
    const tn = state.tenants.find(x=>x.id===c.tenantId);

      const cutoff = new Date(today); cutoff.setDate(cutoff.getDate()+30);
      return d && d>=today && d<=cutoff && ch.status==='pending';
    })
    .sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
    .slice(0,5);

  function savePatch(patch){ dispatch({ type:'updateProperty', item:{...p, ...patch} }); }

  return (
    <div className="space-y-6">
      {/* Back link */}
      <div>
        <button onClick={()=>setRoute('properties')} className="inline-flex items-center gap-1 text-sm text-ink-500 hover:text-ink-900">

      {/* Hero header */}
      <Card className="p-0 overflow-hidden">
        <div className="aspect-[21/9] bg-ink-100 relative">
          {p.photo ? (
            <img src={p.photo} alt="" className="w-full h-full object-cover"/>

            <div className="w-full h-full flex items-center justify-center text-6xl opacity-60">🏠</div>
          )}
        </div>
        <div className="p-5">
          <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
            <div className="min-w-0">
              <h1 className="text-2xl font-bold text-ink-900 truncate">{pickName(p,lang)}</h1>
              <div className="text-sm text-ink-500 mt-1">
                {[p.area, p.street, p.buildingNo, p.emirate].filter(Boolean).join(' · ')}
              </div>
              {p.makaniPlot && <div className="text-xs text-ink-500 mt-0.5">Makani / Plot: <span className="num">{p.makaniPlot}</span></div>}

            <div className="flex flex-wrap items-center gap-2">
              <a href={mapsUrl(p)} target="_blank" rel="noopener noreferrer">
                <Button variant="secondary" size="sm">📍 Open in Google Maps</Button>
              </a>
              <Button variant="secondary" size="sm" icon={<I.edit/>} onClick={()=>setEditing(true)}>{t('edit')}</Button>
              <Button variant="danger" size="sm" icon={<I.trash/>} onClick={()=>setDeleting(true)}>{t('delete')}</Button>
            </div>
          </div>
        </div>
      </Card>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <Kpi tone="blue"  label={t('units')}          value={stats.unitsHere.length} sub={`${stats.occupied} ${t('unit_occupied').toLowerCase()}`} />
        <Kpi tone="green" label={`${t('aed')}/mo`}     value={fmtAed(Math.round(stats.monthlyIncome), lang)} />
        <Kpi tone="amber" label={`${t('yearTotal')} ${t('expected')}`} value={fmtAed(stats.expectedYr, lang)} sub={`${collectionPct}% ${t('received').toLowerCase()}`} />
        <Kpi tone="red"   label={t('kpi_overdue')}    value={stats.overdue.length} sub={fmtAed(stats.overdue.reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0), lang)} />

          <div className="text-ink-500 text-sm">{t('empty')}</div>

                  <th className="text-start px-3 py-2 font-medium">{t('kind')}</th>

              </thead>
              <tbody>

        <Card title={t('upcomingCheques')}>
          {upcomingHere.length===0 ? <div className="text-ink-500 text-sm">{t('nothingDue')}</div> : (
            <ul className="divide-y divide-ink-100">
              {upcomingHere.map(ch=>{
                const c = state.contracts.find(x=>x.id===ch.contractId);
                const u = c && state.units.find(x=>x.id===c.unitId);
                const tn = c && state.tenants.find(x=>x.id===c.tenantId);

      <PropertyEditor open={editing} item={p} onClose={()=>setEditing(false)} onSave={(item)=>{ dispatch({type:'updateProperty', item}); setEditing(false); }}/>

        onCancel={()=>setDeleting(false)}
        onConfirm={()=>{ dispatch({ type:'deleteProperty', id:p.id }); setRoute('properties'); }}/>

  );

function PropertyEditor({ open, item, onClose, onSave }){
  const { state } = useApp();
  const { t } = useT();
  const [v, setV] = useState(item || {});
  const photoRef = useRef(null);
  useEffect(()=>{ setV(item || {}); }, [item]);
  if(!open) return null;
  const isNew = !state.properties.some(p=>p.id===v.id);
  const update = patch => setV({...v, ...patch});

  function pickPhoto(){ photoRef.current && photoRef.current.click(); }
  function onPhoto(e){
    const file = e.target.files?.[0]; if(!file) return;
    if(file.size > 1024*1024){ alert('Photo too large. Keep it under 1 MB.'); e.target.value=''; return; }
    const reader = new FileReader();
    reader.onload = () => { update({ photo: reader.result }); e.target.value=''; };
    reader.readAsDataURL(file);
  }

  return (
    <Modal open={open} onClose={onClose} title={isNew ? t('addProperty') : t('editProperty')}>
      {/* Photo */}
      <div className="mb-4">
        <div className="aspect-[16/9] rounded-2xl bg-ink-100 overflow-hidden flex items-center justify-center relative">
          {v.photo ? (
            <img src={v.photo} alt="" className="w-full h-full object-cover"/>
          ) : (
            <div className="text-center text-ink-500">
              <div className="text-4xl">🏠</div>
              <div className="text-xs mt-1">No photo yet</div>
            </div>
          )}
        </div>
        <div className="mt-2 flex items-center gap-2">
          <Button variant="secondary" size="sm" onClick={pickPhoto}>📷 {v.photo ? 'Change photo' : 'Add photo'}</Button>
          {v.photo && <Button variant="ghost" size="sm" onClick={()=>update({photo:''})}>Remove</Button>}
          <input ref={photoRef} type="file" accept="image/*" className="hidden" onChange={onPhoto}/>
        </div>
      </div>

      <div className="grid sm:grid-cols-2 gap-4">
        <Field label={t('name')} required>
          <Input value={v.name||''} onChange={e=>update({name:e.target.value})}/>
        </Field>
        <Field label={t('nameAr')}>
          <Input value={v.nameAr||''} onChange={e=>update({nameAr:e.target.value})} dir="rtl"/>
        </Field>
        <Field label={t('propertyType')}>
          <Select value={v.type||'building'} onChange={e=>update({type:e.target.value})}>
            {PROPERTY_TYPES.map(x=> <option key={x} value={x}>{t('property_'+x, x)}</option>)}
          </Select>
        </Field>
        <Field label={t('emirate')} required>
          <Select value={v.emirate||'Abu Dhabi'} onChange={e=>update({emirate:e.target.value})}>
            {EMIRATES.map(x=> <option key={x} value={x}>{x}</option>)}
          </Select>
        </Field>
        <Field label={t('area')} hint="e.g. Khalifa City, Al Mutaredh, Al Hili">
          <Input value={v.area||''} onChange={e=>update({area:e.target.value})}/>
        </Field>
        <Field label={t('street')}>
          <Input value={v.street||''} onChange={e=>update({street:e.target.value})}/>
        </Field>
        <Field label={t('buildingNo')}>
          <Input value={v.buildingNo||''} onChange={e=>update({buildingNo:e.target.value})}/>
        </Field>
        <Field label="Makani / Plot #">
          <Input value={v.makaniPlot||''} onChange={e=>update({makaniPlot:e.target.value})}/>
        </Field>
        <Field label={t('notes')} className="sm:col-span-2">
          <Textarea rows="3" value={v.notes||''} onChange={e=>update({notes:e.target.value})}/>
        </Field>
      </div>
      <div className="mt-5 flex gap-2 justify-end">
        <Button variant="secondary" onClick={onClose}>{t('cancel')}</Button>
        <Button onClick={()=>{ if(!v.name?.trim()){ alert(t('required')+': '+t('name')); return; } onSave(v); }}>{t('save')}</Button>
      </div>
    </Modal>
  );
}

function UnitsPage(){
  const { state, dispatch } = useApp();
  const { t, lang } = useT();
  const today = startOfDay(new Date());
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [search, setSearch] = useState('');
  const [propFilter, setPropFilter] = useState('');
  const [statusFilter, setStatusFilter] = useState('');

  let items = state.units;
  if(propFilter)   items = items.filter(u=>u.propertyId===propFilter);
  if(statusFilter) items = items.filter(u=>u.status===statusFilter);
  const filtered = useFiltered(items, search, ['label','notes']);

  function blank(){ return { id:uid('u'), propertyId: state.properties[0]?.id || '', label:'', kind:'apartment', bedrooms:0, bathrooms:0, areaSqft:0, monthlyRentAed:0, status:'vacant', notes:'' }; }
  function save(item){
    if(state.units.some(u=>u.id===item.id)) dispatch({ type:'updateUnit', item });
    else dispatch({ type:'addUnit', item });
    setEditItem(null);
  }

  function unitInfo(u){
    const activeContract = state.contracts.find(c=>c.unitId===u.id && c.status==='active');
    const tenant = activeContract && state.tenants.find(t=>t.id===activeContract.tenantId);
    const cheques = activeContract ? state.cheques.filter(ch=>ch.contractId===activeContract.id) : [];
    const overdue = cheques.filter(ch=>{
      const d = parseISO(ch.dueDate);
      return d && d<today && (ch.status==='pending'||ch.status==='bounced');
    });
    const recentCleared = cheques.filter(ch=>ch.status==='cleared')
      .sort((a,b)=>(b.clearedDate||b.dueDate).localeCompare(a.clearedDate||a.dueDate))[0];
    let chequeStatus = null;
    if(overdue.length){
      const oldest = overdue.sort((a,b)=>a.dueDate.localeCompare(b.dueDate))[0];
      const days = daysBetween(parseISO(oldest.dueDate), today);
      chequeStatus = { tone:'red', label: `${overdue.length} ${t('overdueBy')} ${days}d` };
    } else if(recentCleared){
      chequeStatus = { tone:'green', label: fmtDate(recentCleared.clearedDate||recentCleared.dueDate, lang) };
    } else if(cheques.length){
      chequeStatus = { tone:'amber', label: t('cheque_pending') };
    }
    return { activeContract, tenant, chequeStatus };
  }

  function toggleOccupancy(u, e){
    e.stopPropagation();
    const next = u.status==='vacant' ? 'occupied' : (u.status==='occupied' ? 'vacant' : u.status);
    dispatch({ type:'updateUnit', item: { ...u, status: next } });
  }

  function rowClick(u){
    location.hash = 'properties/'+u.propertyId;
  }

  if(state.properties.length===0){
    return (
      <Card>
        <Empty icon="🏠" title={t('empty')} hint={`${t('properties')} → ${t('addProperty')}`} />
      </Card>
    );
  }

  return (
    <>
      <PageHeader title={t('units')} count={filtered.length} search={search} setSearch={setSearch}
        filter={
          <div className="flex gap-2">
            <Select value={propFilter} onChange={e=>setPropFilter(e.target.value)} className="text-sm">
              <option value="">{t('all')} {t('properties').toLowerCase()}</option>
              {state.properties.map(p=> <option key={p.id} value={p.id}>{pickName(p,lang)}</option>)}
            </Select>
            <Select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="text-sm">
              <option value="">{t('all')}</option>
              {UNIT_STATUS.map(s=> <option key={s} value={s}>{t('unit_'+s)}</option>)}
            </Select>
          </div>
        }
        action={<Button icon={<I.plus/>} onClick={()=>setEditItem(blank())}>{t('addUnit')}</Button>} />

      {filtered.length===0 ? (
        <Card><Empty icon="🚪" title={t('empty')} hint={t('emptyHelp')} /></Card>
      ) : (
        <Card>
          <div className="overflow-x-auto -mx-5">
            <table className="w-full text-sm">
              <thead className="text-ink-500">
                <tr className="border-b border-ink-100">
                  <th className="text-start px-5 py-2 font-medium">{t('property')} · {t('unit')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('tenant')}</th>
                  <th className="text-end  px-3 py-2 font-medium">{t('monthlyRent')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('endDate')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('cheque')}</th>
                  <th className="text-start px-3 py-2 font-medium">{t('status')}</th>
                  <th className="text-end  px-5 py-2 font-medium">{t('actions')}</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(u=>{
                  const p = state.properties.find(p=>p.id===u.propertyId);
                  const info = unitInfo(u);
                  const leaseEnd = info.activeContract?.endDate;
                  const daysToEnd = leaseEnd ? daysBetween(today, parseISO(leaseEnd)) : null;
                  return (
                    <tr key={u.id} onClick={()=>rowClick(u)}
                      className="border-b border-ink-100 last:border-0 hover:bg-ink-100/40 cursor-pointer">
                      <td className="px-5 py-3">
                        <div className="font-medium text-ink-900">{u.label || '—'}</div>
                        <div className="text-xs text-ink-500">{pickName(p,lang) || '—'} · {t('unit_kind_'+u.kind, u.kind)} {u.bedrooms?`· ${u.bedrooms}BR`:''}</div>
                      </td>
                      <td className="px-3 py-3">
                        {info.tenant ? (
                          <div>
                            <div className="font-medium text-ink-900">{pickName(info.tenant,lang)}</div>
                            {info.tenant.phone && <div className="text-xs text-ink-500 num">{info.tenant.phone}</div>}
                          </div>
                        ) : <span className="text-ink-500">—</span>}
                      </td>
                      <td className="px-3 py-3 text-end num font-medium">{fmtAed(u.monthlyRentAed, lang)}</td>
                      <td className="px-3 py-3">
                        {leaseEnd ? (
                          <div>
                            <div className="num text-ink-700">{fmtDate(leaseEnd, lang)}</div>
                            {daysToEnd!=null && (
                              <Badge tone={daysToEnd<=60?'amber':daysToEnd<=14?'red':'gray'}>{daysToEnd} {t('daysLeft')}</Badge>
                            )}
                          </div>
                        ) : <span className="text-ink-500">—</span>}
                      </td>
                      <td className="px-3 py-3">
                        {info.chequeStatus ? <Badge tone={info.chequeStatus.tone}>{info.chequeStatus.label}</Badge> : <span className="text-ink-500">—</span>}
                      </td>
                      <td className="px-3 py-3">
                        <button onClick={e=>toggleOccupancy(u,e)} title="Toggle vacant/occupied"
                          className="inline-block">
                          <Badge tone={u.status==='occupied'?'green':u.status==='vacant'?'gray':u.status==='maintenance'?'amber':'blue'}>{t('unit_'+u.status)} ⇄</Badge>
                        </button>
                      </td>
                      <td className="px-5 py-3 text-end" onClick={e=>e.stopPropagation()}>
                        <RowActions onEdit={()=>setEditItem(u)} onDelete={()=>setDeleteId(u.id)} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      <UnitEditor open={!!editItem} item={editItem} onClose={()=>setEditItem(null)} onSave={save} />
      <ConfirmDialog open={!!deleteId} message={t('confirmDelete')}
        onCancel={()=>setDeleteId(null)} onConfirm={()=>{ dispatch({ type:'deleteUnit', id:deleteId }); setDeleteId(null); }} />
    </>
  );
}

      <PageHeader title={t('settings')} />

      {/* Backup status banner */}
      <div className={classNames(
        'p-4 rounded-2xl border flex flex-col sm:flex-row sm:items-center justify-between gap-3',
        backupTone==='red'   ? 'bg-red-50 border-red-200 text-red-800' :
        backupTone==='amber' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                                'bg-emerald-50 border-emerald-200 text-emerald-800'
      )}>
        <div className="flex items-start gap-3">
          <span className="mt-0.5"><I.alert/></span>
          <div>
            <div className="font-semibold">{backupLabel}</div>
            <div className="text-sm opacity-90">
              {backupTone!=='green' ? "Your data lives only in this browser. Export a backup file regularly and keep it safe (Google Drive / email / USB)." : "Great. Keep backing up at least once a week."}
            </div>
          </div>
        </div>
        <Button variant={backupTone==='green'?'secondary':'primary'} onClick={exportAll}>⬇ Backup now</Button>
      </div>

      <Card title="Landlord">
        <div className="grid sm:grid-cols-2 gap-4">
          <Field label={t('landlordName')}>
            <Input value={state.settings.landlordName||''} onChange={e=>dispatch({type:'setSettings', patch:{ landlordName:e.target.value }})}/>

          <Field label={t('landlordNameAr')}>
            <Input dir="rtl" value={state.settings.landlordNameAr||''} onChange={e=>dispatch({type:'setSettings', patch:{ landlordNameAr:e.target.value }})}/>

            <Select value={state.settings.lang||'en'} onChange={e=>dispatch({type:'setSettings', patch:{ lang:e.target.value }})}>
              <option value="en">English</option>
              <option value="ar">العربية</option>
            </Select>
          </Field>
          <Field label={t('reminderDays')}>
            <Input type="number" min="1" max="60" value={state.settings.reminderDaysAhead||14} onChange={e=>dispatch({type:'setSettings', patch:{ reminderDaysAhead: parseInt(e.target.value||14,10) }})}/>

      <Card title="Data & storage">

          <Button variant="secondary" onClick={()=>setShowReceipt(true)}>🖨️ Test print receipt</Button>
          <Button variant="danger" onClick={()=>setConfirmClear(true)}>{t('clearAll')}</Button>
        </div>
      </Card>

      <Card title={t('aboutApp')}>
        <p className="text-sm text-ink-700">{t('aboutText')}</p>
        <ul className="mt-3 text-sm text-ink-700 list-disc ms-5 space-y-1">
          <li>Tawtheeq registration (Abu Dhabi + Al Ain)</li>

          <li>2-month notice period reminder</li>
          <li>Cheque ledger with bank-status workflow</li>
          <li>Emirates ID / passport / visa expiry alerts</li>
          <li>Maintenance log with AED 500 threshold flag (UAE convention)</li>
          <li>VAT toggle (residential exempt, commercial 5%)</li>
        </ul>
      </Card>

      {/* Type-DELETE-to-confirm clear data dialog */}
      {confirmClear && (
        <Modal open={true} onClose={closeClearDialog} title="Delete ALL data?" size="sm">

            <div className="p-4 rounded-xl bg-red-50 border border-red-200 text-sm text-red-800">
              <strong>Danger:</strong> This will permanently delete every property, unit, tenant, contract, cheque, payment, document, and maintenance record. This <strong>cannot</strong> be undone.
              {!lastBackup && <div className="mt-2"><strong>You have never backed up.</strong> Export a backup first or you will lose everything.</div>}
            </div>
            <Field label="Type DELETE in capital letters to confirm">

function App(){
  const [state, dispatch] = useReducer(reducer, undefined, loadState);
  const [route, setRoute] = useState(() => (location.hash.replace('#','') || 'dashboard'));

  useEffect(()=>{ saveState(state); }, [state]);
  useEffect(()=>{
    const onHash = () => setRoute(location.hash.replace('#','') || 'dashboard');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  },[]);
  useEffect(()=>{ location.hash = route; }, [route]);

  // set lang on root
  useEffect(()=>{
    const lang = state.settings.lang || 'en';
    document.documentElement.lang = lang;
    document.documentElement.dir  = lang==='ar' ? 'rtl' : 'ltr';
  }, [state.settings.lang]);

  const [routeSeg, routeId] = route.split('/');
  const ctx = { state, dispatch };
  return (
    <AppCtx.Provider value={ctx}>
      <Shell route={routeSeg} setRoute={setRoute}>
        {routeSeg==='dashboard'   && <Dashboard setRoute={setRoute} />}
        {routeSeg==='properties'  && (routeId ? <PropertyDetail id={routeId} setRoute={setRoute}/> : <PropertiesPage setRoute={setRoute}/>)}
        {routeSeg==='units'       && <UnitsPage />}
        {routeSeg==='tenants'     && (routeId ? <TenantDetail id={routeId} setRoute={setRoute}/> : <TenantsPage setRoute={setRoute}/>)}
        {routeSeg==='contracts'   && (routeId ? <ContractDetail id={routeId} setRoute={setRoute}/> : <ContractsPage setRoute={setRoute}/>)}
        {routeSeg==='cheques'     && <ChequesPage />}
        {routeSeg==='payments'    && <PaymentsPage />}
        {routeSeg==='maintenance' && <MaintenancePage />}
        {routeSeg==='documents'   && <DocumentsPage setRoute={setRoute}/>}
        {routeSeg==='reports'     && <ReportsPage />}
        {routeSeg==='settings'    && <SettingsPage />}
      </Shell>
    </AppCtx.Provider>
  );
}

// ---------- Property helpers ---------------------------------------------

function mapsUrl(p){
  if(!p) return '#';
  const q = [p.area, p.street, p.buildingNo, p.makaniPlot, p.emirate, 'UAE'].filter(Boolean).join(' ');
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}

function tenantStats(state, tenantId){
  const today = startOfDay(new Date());
  const contracts = state.contracts.filter(c=>c.tenantId===tenantId);
  const contractIds = contracts.map(c=>c.id);
  const cheques = state.cheques.filter(ch=>contractIds.includes(ch.contractId));
  const outstanding = cheques
    .filter(ch=>ch.status==='pending'||ch.status==='bounced')
    .reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const overdue = cheques.filter(ch=>{
    const d=parseISO(ch.dueDate); return d && d<today && (ch.status==='pending'||ch.status==='bounced');
  });
  const settled = cheques.filter(ch=>['cleared','bounced','replaced'].includes(ch.status));
  const onTime = cheques.filter(ch=>{
    if(ch.status!=='cleared') return false;
    const due = parseISO(ch.dueDate); const cleared = parseISO(ch.clearedDate);
    if(!due) return false;
    if(!cleared) return true;
    return daysBetween(due, cleared) <= 3; // within 3 days = on time
  }).length;
  const bouncedCount = cheques.filter(ch=>ch.status==='bounced').length;
  const reliability = settled.length>0 ? Math.round((onTime/settled.length)*100) : null;
  let reliabilityTone='gray', reliabilityLabel='—';
  if(reliability!=null){
    if(bouncedCount>0)        { reliabilityTone='red';   reliabilityLabel=`${bouncedCount} ✗ · ${reliability}% on-time`; }
    else if(reliability>=90)  { reliabilityTone='green'; reliabilityLabel=`★ ${reliability}% on-time`; }
    else if(reliability>=60)  { reliabilityTone='amber'; reliabilityLabel=`${reliability}% on-time`; }
    else                       { reliabilityTone='red';   reliabilityLabel=`${reliability}% on-time`; }
  }
  // expiry warnings
  const tn = state.tenants.find(x=>x.id===tenantId) || {};
  function check(date, label){
    if(!date) return null;
    const d = parseISO(date); if(!d) return null;
    const days = daysBetween(today, d);
    if(days < -30) return null;            // long expired, don't spam
    if(days > 60) return null;             // not soon
    return { label, days, tone: days<0?'red':days<=30?'amber':'gray' };
  }
  const expiries = [
    check(tn.emiratesIdExpiry, 'ID'),
    check(tn.passportExpiry,    'Passport'),
    check(tn.visaExpiry,        'Visa'),
  ].filter(Boolean);
  return { contracts, cheques, outstanding, overdue, reliability, reliabilityTone, reliabilityLabel, expiries };
}

function propertyStats(state, propertyId, year){
  const unitsHere = state.units.filter(u=>u.propertyId===propertyId);
  const occupied  = unitsHere.filter(u=>u.status==='occupied').length;
  const unitIds   = unitsHere.map(u=>u.id);
  const contracts = state.contracts.filter(c=>unitIds.includes(c.unitId));
  const activeContracts = contracts.filter(c=>c.status==='active');
  // monthly expected rent from currently-active contracts
  const monthlyIncome = activeContracts.reduce((s,c)=>s + ((parseFloat(c.annualRentAed)||0)/12), 0);
  const contractIds = contracts.map(c=>c.id);
  const yr = year || new Date().getFullYear();
  const yrCheques = state.cheques.filter(ch=>{
    if(!contractIds.includes(ch.contractId)) return false;
    const d = parseISO(ch.dueDate); return d && d.getFullYear()===yr;
  });
  const expectedYr = yrCheques.reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const receivedYr = yrCheques.filter(ch=>ch.status==='cleared').reduce((s,ch)=>s+(parseFloat(ch.amountAed)||0),0);
  const overdue = state.cheques.filter(ch=>{
    if(!contractIds.includes(ch.contractId)) return false;
    const d = parseISO(ch.dueDate); return d && d<startOfDay(new Date()) && (ch.status==='pending'||ch.status==='bounced');
  });
  return { unitsHere, occupied, contracts, activeContracts, monthlyIncome, expectedYr, receivedYr, overdue };
}
